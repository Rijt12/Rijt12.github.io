<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Restore Archived Session</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
  <style>
    body { font-family: sans-serif; max-width: 560px; margin: 60px auto; padding: 20px; }
    input { display: block; width: 100%; padding: 10px; margin-bottom: 10px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { padding: 10px 20px; font-size: 14px; background: #dc4f2a; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
    button:disabled { background: #94a3b8; cursor: not-allowed; }
    select { display: block; width: 100%; padding: 8px 10px; font-size: 13px; border: 1px solid #cbd5e1; border-radius: 4px; background: #f8fafc; margin-top: 4px; box-sizing: border-box; }
    #log { margin-top: 20px; font-size: 13px; line-height: 1.8; white-space: pre-wrap; }
    .ok   { color: #059669; }
    .err  { color: #dc2626; }
    .skip { color: #9ca3af; }
    .session-card { border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 12px; background: #f8fafc; overflow: hidden; }
    .session-card .header { padding: 12px 14px; display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
    .session-card .info .date { font-size: 14px; font-weight: 500; }
    .session-card .info .meta { font-size: 11px; color: #64748b; margin-top: 2px; }
    .session-card .reassign { padding: 8px 14px; border-top: 1px solid #e2e8f0; background: #fff7ed; }
    .session-card .reassign label { font-size: 11px; color: #92400e; text-transform: uppercase; letter-spacing: 0.4px; }
    .session-card .footer { padding: 10px 14px; border-top: 1px solid #e2e8f0; display: flex; justify-content: flex-end; }
    #sessionList { margin-top: 16px; }
  </style>
</head>
<body>
  <h2>Restore Archived Session</h2>
  <p style="font-size:13px;color:#666">Browse archived (deleted) sessions and restore them to the app.</p>

  <div id="loginForm">
    <p>Log in with your Supabase account:</p>
    <input id="email" type="email" placeholder="Email address"/>
    <input id="password" type="password" placeholder="Password"/>
    <button onclick="doLogin()">Log in</button>
  </div>

  <div id="mainSection" style="display:none">
    <div id="sessionList"></div>
  </div>

  <div id="log"></div>

<script>
  var SUPABASE_URL      = 'https://skofblajffjorwprkknz.supabase.co';
  var SUPABASE_ANON_KEY = 'sb_publishable_QQLElZxZJFOV4IHpbtgQLQ_L3R8SnOh';
  var sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  var userId = null;
  var clientMap = {};   // id → name
  var allClients = [];  // [{id, name}]
  var archivedRows = [];

  function log(msg, cls) {
    var el = document.getElementById("log");
    var span = document.createElement("span");
    span.className = cls || "";
    span.textContent = msg + "\n";
    el.appendChild(span);
  }

  function fmtDate(iso) {
    if (!iso) return "—";
    return new Date(iso).toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" });
  }

  async function doLogin() {
    var email = document.getElementById("email").value.trim();
    var pw    = document.getElementById("password").value;
    if (!email || !pw) { log("Enter email and password.", "err"); return; }
    var res = await sb.auth.signInWithPassword({ email: email, password: pw });
    if (res.error) { log("✗ " + res.error.message, "err"); return; }
    userId = res.data.user.id;
    document.getElementById("loginForm").style.display = "none";
    document.getElementById("mainSection").style.display = "block";
    log("✓ Logged in as " + res.data.user.email, "ok");
    await loadArchived();
  }

  async function loadArchived() {
    log("Loading...", "");

    var cRes = await sb.from("clients").select("id,name").eq("user_id", userId).order("name");
    if (!cRes.error) {
      allClients = cRes.data || [];
      allClients.forEach(function(c){ clientMap[c.id] = c.name; });
    }

    var res = await sb.from("archived_sessions").select("*").eq("user_id", userId).order("archived_at", { ascending: false });
    if (res.error) { log("✗ " + res.error.message, "err"); return; }
    archivedRows = res.data || [];

    document.getElementById("log").innerHTML = "";

    if (archivedRows.length === 0) {
      log("No archived sessions found.", "skip");
      return;
    }

    renderList();
  }

  function renderList() {
    var list = document.getElementById("sessionList");
    list.innerHTML = "<p style='font-size:13px;color:#444'>" + archivedRows.length + " archived session(s):</p>";

    archivedRows.forEach(function(row, idx) {
      var knownClient = clientMap[row.client_id];
      var clientName = knownClient || "Unknown client";
      var exCount = Array.isArray(row.exercises) ? row.exercises.length : 0;
      var needsReassign = !knownClient;

      var card = document.createElement("div");
      card.className = "session-card";
      card.id = "card_" + idx;

      var headerHtml =
        '<div class="header">' +
          '<div class="info">' +
            '<div class="date">' + clientName + ' · ' + fmtDate(row.date) + '</div>' +
            '<div class="meta">' + exCount + ' exercise(s)' + (row.notes ? ' · ' + row.notes.slice(0,50) : '') + '</div>' +
            '<div class="meta" style="color:#94a3b8">Archived: ' + fmtDate(row.archived_at) + '</div>' +
          '</div>' +
        '</div>';

      var reassignHtml = "";
      if (needsReassign) {
        var opts = allClients.map(function(c){ return '<option value="'+c.id+'">'+c.name+'</option>'; }).join("");
        reassignHtml =
          '<div class="reassign">' +
            '<label>Client not found — assign to:</label>' +
            '<select id="pick_'+idx+'">' +
              '<option value="">— choose client —</option>' +
              opts +
            '</select>' +
          '</div>';
      }

      var footerHtml =
        '<div class="footer">' +
          '<button onclick="restoreSession(\''+row.id+'\','+idx+')">Restore</button>' +
        '</div>';

      card.innerHTML = headerHtml + reassignHtml + footerHtml;
      list.appendChild(card);
    });
  }

  async function restoreSession(id, idx) {
    var row = archivedRows.find(function(r){ return r.id === id; });
    if (!row) { log("Session not found.", "err"); return; }

    var targetClientId = row.client_id;

    // If original client no longer exists, use picker
    if (!clientMap[targetClientId]) {
      var picker = document.getElementById("pick_" + idx);
      if (!picker || !picker.value) {
        log("⚠ Please choose a client to assign this session to.", "skip"); return;
      }
      targetClientId = picker.value;
    }

    // Check not already in sessions
    var check = await sb.from("sessions").select("id").eq("id", id).eq("user_id", userId);
    if (!check.error && check.data && check.data.length > 0) {
      log("⚠ Session already exists in app.", "skip"); return;
    }

    var insert = await sb.from("sessions").insert([{
      id: row.id,
      client_id: targetClientId,
      client_ids: [targetClientId],
      date: row.date,
      notes: row.notes,
      exercises: row.exercises,
      user_id: userId
    }]);
    if (insert.error) { log("✗ " + insert.error.message, "err"); return; }

    var clientName = clientMap[targetClientId] || targetClientId;
    log("✓ Restored to " + clientName + " · " + fmtDate(row.date) + " — refresh the app to see it.", "ok");

    // Grey out the card
    var card = document.getElementById("card_" + idx);
    if (card) { card.style.opacity = "0.4"; card.style.pointerEvents = "none"; }
  }
</script>
</body>
</html>
