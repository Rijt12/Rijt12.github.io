<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <title>Fix Low row → unilateral</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
  <style>
    body { font-family: sans-serif; max-width: 560px; margin: 60px auto; padding: 20px; }
    input { display: block; width: 100%; padding: 10px; margin-bottom: 10px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { padding: 12px 24px; font-size: 15px; background: #dc4f2a; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
    button:disabled { background: #94a3b8; cursor: not-allowed; }
    #log { margin-top: 20px; font-size: 13px; line-height: 1.8; white-space: pre-wrap; }
    .ok   { color: #059669; }
    .err  { color: #dc2626; }
    .skip { color: #9ca3af; }
  </style>
</head>
<body>
  <h2>Fix: Low row → uni toggle aan</h2>
  <p style="font-size:13px;color:#666">Zet unilateral en performedUnilateral op true voor alle "Low row" oefeningen in bestaande sessies. Geen sessies worden verwijderd of opnieuw aangemaakt.</p>
  <div id="loginForm">
    <p>Log in met je Supabase account:</p>
    <input id="email" type="email" placeholder="E-mailadres"/>
    <input id="password" type="password" placeholder="Wachtwoord"/>
    <button onclick="doLogin()">Inloggen</button>
  </div>
  <div id="importSection" style="display:none">
    <button id="btn" onclick="runFix()">Fix uitvoeren</button>
  </div>
  <div id="log"></div>
<script>
  var SUPABASE_URL      = 'https://skofblajffjorwprkknz.supabase.co';
  var SUPABASE_ANON_KEY = 'sb_publishable_QQLElZxZJFOV4IHpbtgQLQ_L3R8SnOh';
  var sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function log(msg, cls) {
    var el = document.getElementById("log");
    var span = document.createElement("span");
    span.className = cls || "";
    span.textContent = msg + "\n";
    el.appendChild(span);
  }

  async function doLogin() {
    var email    = document.getElementById("email").value.trim();
    var password = document.getElementById("password").value;
    var { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) { log("✗ Login mislukt: " + error.message, "err"); return; }
    document.getElementById("loginForm").style.display    = "none";
    document.getElementById("importSection").style.display = "block";
    log("✓ Ingelogd", "ok");
  }

  async function runFix() {
    document.getElementById("btn").disabled = true;
    var userRes = await sb.auth.getUser();
    if (userRes.error || !userRes.data.user) { log("Niet ingelogd.", "err"); return; }
    var userId = userRes.data.user.id;

    log("Sessies ophalen...");
    var { data: sessions, error: sessErr } = await sb.from("sessions").select("id,exercises").eq("user_id", userId);
    if (sessErr) { log("✗ " + sessErr.message, "err"); document.getElementById("btn").disabled = false; return; }
    log("✓ " + sessions.length + " sessies gevonden", "ok");

    var toUpdate = sessions.filter(function(s) {
      return (s.exercises || []).some(function(e) { return e.name === "Low row"; });
    });
    log(toUpdate.length + " sessies bevatten 'Low row'");

    var ok = 0, fail = 0;
    for (var i = 0; i < toUpdate.length; i++) {
      var sess = toUpdate[i];
      var updatedExercises = sess.exercises.map(function(e) {
        if (e.name !== "Low row") return e;
        return Object.assign({}, e, {
          unilateral: true,
          isUnilateralExercise: true,
          performedUnilateral: true
        });
      });
      var { error } = await sb.from("sessions").update({ exercises: updatedExercises }).eq("id", sess.id).eq("user_id", userId);
      if (error) { log("✗ sessie " + sess.id + ": " + error.message, "err"); fail++; }
      else { ok++; }
    }

    log("\nKlaar: " + ok + " sessies bijgewerkt" + (fail ? ", " + fail + " mislukt" : "") + ".", ok > 0 ? "ok" : "skip");
    document.getElementById("btn").disabled = false;
  }
</script>
</body>
</html>
