<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Import Mark van der Rijt → Supabase</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
  <style>
    body { font-family: sans-serif; max-width: 520px; margin: 60px auto; padding: 20px; }
    input { display: block; width: 100%; padding: 10px; margin-bottom: 10px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { padding: 12px 24px; font-size: 15px; background: #dc4f2a; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
    button:disabled { background: #94a3b8; cursor: not-allowed; }
    #log { margin-top: 20px; font-size: 13px; line-height: 1.8; white-space: pre-wrap; }
    .ok   { color: #059669; }
    .err  { color: #dc2626; }
    .skip { color: #9ca3af; }
  </style>
</head>
<body>
  <h2>Import: Mark van der Rijt</h2>
  <p style="font-size:13px;color:#666">Adds Mark van der Rijt met 12 sessies (W45 2025 – W22 2026), data uit trainingsoverzicht.</p>
  <div id="loginForm">
    <p>Log in with your Supabase account:</p>
    <input id="email" type="email" placeholder="Email address"/>
    <input id="password" type="password" placeholder="Password"/>
    <button onclick="doLogin()">Log in</button>
  </div>
  <div id="importSection" style="display:none">
    <button id="btn" onclick="runImport()">Import Mark van der Rijt</button>
  </div>
  <div id="log"></div>
<script>
  var SUPABASE_URL      = 'https://skofblajffjorwprkknz.supabase.co';
  var SUPABASE_ANON_KEY = 'sb_publishable_QQLElZxZJFOV4IHpbtgQLQ_L3R8SnOh';
  var sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function log(msg, cls) {
    var el = document.getElementById("log");
    var span = document.createElement("span");
    span.className = cls || "";
    span.textContent = msg + "\n";
    el.appendChild(span);
  }

  function uid() { return Math.random().toString(36).slice(2) + Date.now().toString(36); }
  function makeEx(name, pattern, unilateral, sets, notes) {
    return { id: uid(), name: name, pattern: pattern,
             unilateral: !!unilateral, isUnilateralExercise: !!unilateral,
             performedUnilateral: false, sets: sets, notes: notes || "" };
  }
  function s(w, r) { return { weight: String(w), reps: String(r) }; }
  function s3(w, r) { return [s(w,r), s(w,r), s(w,r)]; }

  async function doLogin() {
    var email = document.getElementById("email").value.trim();
    var pw    = document.getElementById("password").value;
    if (!email || !pw) { log("Enter email and password.", "err"); return; }
    var res = await sb.auth.signInWithPassword({ email: email, password: pw });
    if (res.error) { log("✗ " + res.error.message, "err"); return; }
    document.getElementById("loginForm").style.display = "none";
    document.getElementById("importSection").style.display = "block";
    log("✓ Logged in as " + res.data.user.email, "ok");
  }

  async function runImport() {
    document.getElementById("btn").disabled = true;
    var userRes = await sb.auth.getUser();
    if (userRes.error || !userRes.data.user) { log("Not logged in.", "err"); return; }
    var userId = userRes.data.user.id;

    log("Checking if Mark already exists...");
    var existing = await sb.from("clients").select("id,name").eq("user_id", userId);
    if (existing.error) { log("✗ " + existing.error.message, "err"); document.getElementById("btn").disabled = false; return; }
    var existingClient = (existing.data || []).find(function(c){ return c.name.toLowerCase() === "mark van der rijt"; });
    var clientId;
    if (existingClient) {
      clientId = existingClient.id;
      log("✓ Existing client found: " + existingClient.name + " — sessions will be added.", "ok");
    } else {
      clientId = uid();
      log("Creating client...");
      var clientRes = await sb.from("clients").insert([{ id: clientId, name: "Mark van der Rijt", created_at: new Date().toISOString(), user_id: userId }]);
      if (clientRes.error) { log("✗ " + clientRes.error.message, "err"); document.getElementById("btn").disabled = false; return; }
      log("✓ Client created: Mark van der Rijt", "ok");
    }

    var sessions = buildSessions(clientId);
    log("Inserting sessions (" + sessions.length + ")...");
    var sessionsToInsert = sessions.map(function(sess) {
      return { id: sess.id, client_id: clientId, client_ids: [clientId], date: sess.date, notes: sess.notes, exercises: sess.exercises, user_id: userId };
    });
    var sessRes = await sb.from("sessions").insert(sessionsToInsert);
    if (sessRes.error) { log("✗ " + sessRes.error.message, "err"); document.getElementById("btn").disabled = false; return; }
    log("✓ " + sessions.length + " sessions inserted", "ok");

    log("Checking exercise library...");
    var libRes = await sb.from("exercise_library").select("name").eq("user_id", userId);
    if (libRes.error) { log("✗ " + libRes.error.message, "err"); document.getElementById("btn").disabled = false; return; }
    var existingNames = (libRes.data || []).map(function(e){ return e.name.toLowerCase(); });

    var newLibExercises = [
      { name: "Split squat",          pattern: "Squat",    unilateral: true  },
      { name: "Romanian deadlift",    pattern: "Hinge",    unilateral: false },
      { name: "Hip thrust",           pattern: "Hinge",    unilateral: false },
      { name: "Leg extension",        pattern: "Quad",     unilateral: true  },
      { name: "Leg curl",             pattern: "Hamstring",unilateral: false },
      { name: "Leg curl prone",       pattern: "Hamstring",unilateral: true  },
      { name: "Adductor machine",     pattern: "Adductor", unilateral: false },
      { name: "Chin up",              pattern: "Pull",     unilateral: false },
      { name: "Lat pulldown",         pattern: "Pull",     unilateral: false },
      { name: "Hi to low cable row",  pattern: "Pull",     unilateral: false },
      { name: "Cable row",            pattern: "Pull",     unilateral: false },
      { name: "Low row",              pattern: "Pull",     unilateral: false },
      { name: "Bent over row",        pattern: "Pull",     unilateral: false },
      { name: "DB bench press",       pattern: "Push",     unilateral: false },
      { name: "Barbell bench press",  pattern: "Push",     unilateral: false },
      { name: "Chest press",          pattern: "Push",     unilateral: false },
      { name: "Pectoralis",           pattern: "Push",     unilateral: false },
      { name: "Horizontal cable fly", pattern: "Push",     unilateral: false },
      { name: "Push up",              pattern: "Push",     unilateral: false },
      { name: "Lateral raise cable",  pattern: "Shoulder", unilateral: false },
      { name: "Seated bicep curls",   pattern: "Bicep",    unilateral: false },
      { name: "Tricep extensions",    pattern: "Tricep",   unilateral: false },
    ];

    var toAdd = newLibExercises.filter(function(e){ return !existingNames.includes(e.name.toLowerCase()); })
      .map(function(e){ return { id: uid(), name: e.name, pattern: e.pattern, unilateral: e.unilateral, user_id: userId }; });
    if (toAdd.length > 0) {
      var addRes = await sb.from("exercise_library").insert(toAdd);
      if (addRes.error) { log("✗ Library: " + addRes.error.message, "err"); }
      else { log("✓ " + toAdd.length + " exercises added to library", "ok"); }
    } else {
      log("Library: all exercises already exist.", "skip");
    }

    log(""); sessions.forEach(function(sess){ log("  ✓ " + sess.date.slice(0,10) + " · " + sess.notes, "ok"); }); log("");
    log("✓ Import complete! Refresh the app to see Mark.", "ok");
    document.getElementById("btn").textContent = "✓ Done";
  }

  function buildSessions(clientId) {
    function sess(date, notes, exercises) {
      return { id: uid(), clientId: clientId, date: new Date(date).toISOString(), notes: notes, exercises: exercises };
    }
    function s4(w,r){ return [s(w,r),s(w,r),s(w,r),s(w,r)]; }

    return [
      // W45 2025 — maandag 3 nov 2025
      sess("2025-11-03", "W45", [
        makeEx("Split squat",          "Squat",     true,  s3(20, 10)),
        makeEx("Hip thrust",           "Hinge",     false, s4(70, 10)),
        makeEx("Leg extension",        "Quad",      true,  s4(35, 10)),
        makeEx("Leg curl",             "Hamstring", false, s3(40, 10)),
        makeEx("Lat pulldown",         "Pull",      false, s4(70, 8),   "sup"),
        makeEx("DB bench press",       "Push",      false, s3(26, 8)),
        makeEx("Lateral raise cable",  "Shoulder",  false, s3(6.25, 10)),
      ]),

      // W47 2025 — maandag 17 nov 2025
      sess("2025-11-17", "W47", [
        makeEx("Split squat",          "Squat",     true,  s3(20, 10)),
        makeEx("Hip thrust",           "Hinge",     false, s4(80, 10)),
        makeEx("Leg extension",        "Quad",      true,  s3(40, 6)),
        makeEx("Leg curl",             "Hamstring", false, s3(45, 10)),
        makeEx("Lat pulldown",         "Pull",      false, s4(70, 8),   "sup"),
        makeEx("Hi to low cable row",  "Pull",      false, s4(25, 10)),
        makeEx("DB bench press",       "Push",      false, [s(30,8),s(30,6),s(30,6),s(30,6)]),
        makeEx("Tricep extensions",    "Tricep",    false, [s(17.5,10),s(17.5,8)]),
      ]),

      // W48 2025 — maandag 24 nov 2025
      sess("2025-11-24", "W48", [
        makeEx("Split squat",          "Squat",     true,  s3(20, 10)),
        makeEx("Hip thrust",           "Hinge",     false, s4(80, 10)),
        makeEx("Leg extension",        "Quad",      true,  s3(40, 6)),
        makeEx("Leg curl",             "Hamstring", false, [s(45,10),s(45,10),s(45,10),s(50,10)]),
        makeEx("Lat pulldown",         "Pull",      false, s3(75, 6),   "sup"),
        makeEx("Hi to low cable row",  "Pull",      false, [s(30,10),s(30,8),s(30,8)]),
        makeEx("DB bench press",       "Push",      false, s4(30, 6)),
        makeEx("Lateral raise cable",  "Shoulder",  false, s3(5, 10)),
        makeEx("Seated bicep curls",   "Bicep",     false, s4(14, 5)),
      ]),

      // W49 2025 — maandag 1 dec 2025
      sess("2025-12-01", "W49", [
        makeEx("Split squat",          "Squat",     true,  s3(20, 10)),
        makeEx("Hip thrust",           "Hinge",     false, s4(80, 10)),
        makeEx("Leg extension",        "Quad",      true,  s4(40, 6)),
        makeEx("Leg curl",             "Hamstring", false, [s(40,10),s(40,10),s(40,10),s(45,12)]),
        makeEx("Leg curl prone",       "Hamstring", true,  s3(20, 8)),
        makeEx("Adductor machine",     "Adductor",  false, s4(40, 12)),
        makeEx("Lat pulldown",         "Pull",      false, s3(75, 8),   "wide"),
        makeEx("Cable row",            "Pull",      false, s3(55, 8)),
        makeEx("DB bench press",       "Push",      false, [s(30,7),s(30,7),s(30,7),s(32,8)]),
        makeEx("Lateral raise cable",  "Shoulder",  false, s3(6.25, 10)),
        makeEx("Seated bicep curls",   "Bicep",     false, s4(14, 5)),
      ]),

      // W51 2025 — maandag 15 dec 2025
      sess("2025-12-15", "W51", [
        makeEx("Split squat",          "Squat",     true,  s4(20, 10)),
        makeEx("Hip thrust",           "Hinge",     false, s3(80, 10)),
        makeEx("Leg extension",        "Quad",      true,  s3(42.5, 7)),
        makeEx("Leg curl",             "Hamstring", false, s3(50, 8)),
        makeEx("Leg curl prone",       "Hamstring", true,  s3(22.5, 8)),
        makeEx("Lat pulldown",         "Pull",      false, s3(80, 8),   "wide"),
        makeEx("DB bench press",       "Push",      false, s3(34, 6)),
        makeEx("Push up",              "Push",      false, [s(0,15),s(0,15),s(0,15)]),
      ]),

      // W52 2025 — maandag 22 dec 2025 (pre-trip Azië)
      sess("2025-12-22", "W52 — pre Azië", [
        makeEx("Split squat",          "Squat",     true,  s4(20, 10)),
        makeEx("Hip thrust",           "Hinge",     false, s3(85, 10)),
        makeEx("Leg extension",        "Quad",      true,  s3(42.5, 8)),
        makeEx("Leg curl",             "Hamstring", false, [s(45,12),s(45,10),s(45,10)]),
        makeEx("Chin up",              "Pull",      false, s4("yellow", 10), "yellow band"),
        makeEx("Lat pulldown",         "Pull",      false, s3(80, 8),   "wide"),
        makeEx("Hi to low cable row",  "Pull",      false, [s(30,10),s(30,8),s(30,8)]),
        makeEx("Cable row",            "Pull",      false, s3(60, 10)),
        makeEx("DB bench press",       "Push",      false, s3(34, 6)),
        makeEx("Push up",              "Push",      false, s4(0, 20)),
      ]),

      // W9 2026 — maandag 23 feb 2026 (terug na Azië)
      sess("2026-02-23", "W9 — terug na Azië", [
        makeEx("Split squat",          "Squat",     true,  s4(20, 10)),
        makeEx("Romanian deadlift",    "Hinge",     false, [s(60,10),s(60,10),s(60,10)]),
        makeEx("Hip thrust",           "Hinge",     false, [s(70,10),s(70,10),s(70,10)]),
        makeEx("Leg extension",        "Quad",      true,  s3(37.5, 8)),
        makeEx("Leg curl",             "Hamstring", false, [s(45,10),s(45,8),s(45,6),s(45,6)]),
        makeEx("Chin up",              "Pull",      false, [s("BW",4),s("BW",4),s("BW",4),s("BW",4),s("BW",4)], "EMOM 5x4"),
        makeEx("Hi to low cable row",  "Pull",      false, [s(27.5,10),s(27.5,7),s(27.5,6),s(27.5,6)]),
        makeEx("Cable row",            "Pull",      false, s3(55, 10)),
        makeEx("DB bench press",       "Push",      false, [s(30,8),s(30,6),s(30,6),s(30,6)]),
        makeEx("Horizontal cable fly", "Push",      false, s3(12.5, 8)),
        makeEx("Tricep extensions",    "Tricep",    false, [s(17.5,10),s(17.5,8)]),
      ]),

      // W11 2026 — maandag 9 mrt 2026
      sess("2026-03-09", "W11", [
        makeEx("Romanian deadlift",    "Hinge",     false, [s(60,10),s(60,10),s(60,10)]),
        makeEx("Hip thrust",           "Hinge",     false, [s(70,10),s(70,10),s(70,10),s(80,10)]),
        makeEx("Leg extension",        "Quad",      true,  s4(35, 8)),
        makeEx("Chin up",              "Pull",      false, [s("BW",5),s("BW",5),s("BW",5),s("BW",5),s("BW",5)], "EMOM 5x5"),
        makeEx("Lat pulldown",         "Pull",      false, [s(70,10),s(70,8),s(70,6),s(70,6)]),
        makeEx("DB bench press",       "Push",      false, [s(30,8),s(30,6),s(30,4),s(30,4)]),
        makeEx("Push up",              "Push",      false, s4(0, 20)),
      ]),

      // W12 2026 — maandag 16 mrt 2026
      sess("2026-03-16", "W12", [
        makeEx("Romanian deadlift",    "Hinge",     false, [s(65,10),s(65,10),s(65,10)]),
        makeEx("Hip thrust",           "Hinge",     false, [s(80,10),s(80,10),s(80,10)]),
        makeEx("Leg extension",        "Quad",      true,  [s(20,10),s(20,10),s(20,10)]),
        makeEx("Chin up",              "Pull",      false, [s("BW",6),s("BW",6),s("BW",6),s("BW",6),s("BW",6),s("BW",6)], "EMOM 5x6"),
        makeEx("Lat pulldown",         "Pull",      false, [s(70,10),s(70,8),s(70,6),s(70,6)], "neutral"),
        makeEx("DB bench press",       "Push",      false, [s(30,8),s(30,5),s(30,4),s(30,4)]),
        makeEx("Push up",              "Push",      false, [s(0,15),s(0,15),s(0,15),s(0,15),s(0,15)]),
      ]),

      // W14 2026 — maandag 30 mrt 2026
      sess("2026-03-30", "W14", [
        makeEx("Chin up",              "Pull",      false, [s(10,5),s(10,3),s(10,3)], "10kg weighted"),
        makeEx("Hi to low cable row",  "Pull",      false, [s(27.5,10),s(27.5,10)]),
        makeEx("Bent over row",        "Pull",      false, [s(30,10),s(30,8)]),
        makeEx("Lat pulldown",         "Pull",      false, [s(60,8),s(60,7),s(60,6)]),
        makeEx("DB bench press",       "Push",      false, [s(32,6),s(32,6),s(32,4)]),
        makeEx("Horizontal cable fly", "Push",      false, s3(45, 12), "Pectoral"),
      ]),

      // W19 2026 — maandag 4 mei 2026
      sess("2026-05-04", "W19", [
        makeEx("Leg curl",             "Hamstring", false, [s(40,10),s(40,10),s(40,8),s(40,8)]),
        makeEx("Chin up",              "Pull",      false, [s("BW",2),s("BW",2),s("BW",2)], "E(0:20)MOM 2reps/10 rounds"),
        makeEx("Lat pulldown",         "Pull",      false, s4(60, 8),   "wide"),
        makeEx("Hi to low cable row",  "Pull",      false, s3(27.5, 8)),
        makeEx("Chest press",          "Push",      false, [s(55,8),s(55,8),s(55,6)]),
        makeEx("Pectoralis",           "Push",      false, s4(45, 8)),
        makeEx("Lateral raise cable",  "Shoulder",  false, s3(6.25, 10)),
      ]),

      // W22 2026 — maandag 25 mei 2026
      sess("2026-05-25", "W22", [
        makeEx("Chin up",              "Pull",      false, [s("BW",2),s("BW",2),s("BW",2)], "E(0:20)MOM 2reps/20 rounds"),
        makeEx("Lat pulldown",         "Pull",      false, [s(70,10),s(70,6),s(70,6),s(70,6)], "sup"),
        makeEx("Low row",              "Pull",      false, s3(70, 10)),
        makeEx("DB bench press",       "Push",      false, [s(26,10),s(26,8),s(26,8)]),
        makeEx("Chest press",          "Push",      false, [s(55,12),s(55,8),s(55,7)]),
        makeEx("Pectoralis",           "Push",      false, [s(50,10),s(50,10),s(50,10),s(50,10),s(55,10),s(55,10)]),
        makeEx("Lateral raise cable",  "Shoulder",  false, s3(6.25, 10)),
      ]),
    ];
  }
</script>
</body>
</html>
