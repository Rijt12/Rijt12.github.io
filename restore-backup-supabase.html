<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Restore Backup</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
  <style>
    body { font-family: sans-serif; max-width: 560px; margin: 60px auto; padding: 20px; }
    input { display: block; width: 100%; padding: 10px; margin-bottom: 10px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { padding: 12px 24px; font-size: 15px; background: #dc4f2a; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
    button:disabled { background: #94a3b8; cursor: not-allowed; }
    .secondary { background: #64748b; margin-left: 8px; }
    #log { margin-top: 20px; font-size: 13px; line-height: 1.8; white-space: pre-wrap; }
    .ok   { color: #059669; }
    .err  { color: #dc2626; }
    .warn { color: #d97706; }
    .info { color: #64748b; }
    .backup-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; border: 1px solid #e2e8f0; border-radius: 6px; margin-bottom: 8px; cursor: pointer; background: #f8fafc; }
    .backup-row:hover { background: #e2e8f0; }
    .backup-row.selected { border-color: #dc4f2a; background: #fff5f2; }
    .backup-date { font-size: 14px; font-weight: 500; }
    .backup-meta { font-size: 11px; color: #64748b; margin-top: 2px; }
    #backupList { margin: 16px 0; }
    #restoreSection { display: none; }
    #backupSection { display: none; }
    .warning-box { background: #fef3c7; border: 1px solid #f59e0b; border-radius: 6px; padding: 12px 14px; font-size: 13px; color: #92400e; margin-bottom: 16px; }
  </style>
</head>
<body>
  <h2>Restore Backup</h2>
  <p style="font-size:13px;color:#666">Restore a previous snapshot of all clients, sessions, and exercises.</p>

  <div id="loginForm">
    <p>Log in with your Supabase account:</p>
    <input id="email" type="email" placeholder="Email address"/>
    <input id="password" type="password" placeholder="Password"/>
    <button onclick="doLogin()">Log in</button>
  </div>

  <div id="backupSection">
    <p style="font-size:13px;color:#444">Choose a backup to restore:</p>
    <div id="backupList"></div>
    <div id="restoreSection">
      <div class="warning-box">
        ⚠ This will <strong>overwrite</strong> all current clients, sessions, and exercises with the selected backup. This cannot be undone.
      </div>
      <button id="restoreBtn" onclick="runRestore()">Restore selected backup</button>
    </div>
  </div>

  <div id="log"></div>

<script>
  var SUPABASE_URL      = 'https://skofblajffjorwprkknz.supabase.co';
  var SUPABASE_ANON_KEY = 'sb_publishable_QQLElZxZJFOV4IHpbtgQLQ_L3R8SnOh';
  var sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  var userId = null;
  var selectedBackup = null;

  function log(msg, cls) {
    var el = document.getElementById("log");
    var span = document.createElement("span");
    span.className = cls || "";
    span.textContent = msg + "\n";
    el.appendChild(span);
  }

  function fmtDate(iso) {
    if (!iso) return "—";
    var d = new Date(iso);
    return d.toLocaleDateString("en-GB", { day:"numeric", month:"short", year:"numeric" })
      + " " + d.toLocaleTimeString("en-GB", { hour:"2-digit", minute:"2-digit" });
  }

  async function doLogin() {
    var email = document.getElementById("email").value.trim();
    var pw    = document.getElementById("password").value;
    if (!email || !pw) { log("Enter email and password.", "err"); return; }
    var res = await sb.auth.signInWithPassword({ email: email, password: pw });
    if (res.error) { log("✗ " + res.error.message, "err"); return; }
    userId = res.data.user.id;
    document.getElementById("loginForm").style.display = "none";
    document.getElementById("backupSection").style.display = "block";
    log("✓ Logged in as " + res.data.user.email, "ok");
    await loadBackups();
  }

  async function loadBackups() {
    log("Loading backups...", "info");
    var res = await sb.from("backups").select("id,created_at,snapshot").eq("user_id", userId).order("created_at", { ascending: false }).limit(30);
    if (res.error) { log("✗ " + res.error.message, "err"); return; }
    var backups = res.data || [];
    document.getElementById("log").innerHTML = "";
    if (backups.length === 0) {
      log("No backups found.", "warn");
      return;
    }
    var list = document.getElementById("backupList");
    list.innerHTML = "";
    backups.forEach(function(b) {
      var snap = b.snapshot || {};
      var clients = (snap.clients || []).length;
      var sessions = (snap.sessions || []).length;
      var lib = (snap.exerciseLibrary || []).length;
      var row = document.createElement("div");
      row.className = "backup-row";
      row.innerHTML =
        '<div><div class="backup-date">' + fmtDate(b.created_at) + '</div>' +
        '<div class="backup-meta">' + clients + ' clients · ' + sessions + ' sessions · ' + lib + ' exercises</div></div>' +
        '<span style="font-size:11px;color:#94a3b8">Select →</span>';
      row.onclick = function() {
        document.querySelectorAll(".backup-row").forEach(function(r){ r.classList.remove("selected"); });
        row.classList.add("selected");
        selectedBackup = b;
        document.getElementById("restoreSection").style.display = "block";
      };
      list.appendChild(row);
    });
    log("✓ " + backups.length + " backup(s) loaded", "ok");
  }

  async function runRestore() {
    if (!selectedBackup) { log("No backup selected.", "err"); return; }
    if (!confirm("Are you sure? This will overwrite ALL current data with the backup from " + fmtDate(selectedBackup.created_at) + ".")) { return; }

    document.getElementById("restoreBtn").disabled = true;
    document.getElementById("log").innerHTML = "";

    var snap = selectedBackup.snapshot || {};
    var clients  = snap.clients  || [];
    var sessions = snap.sessions || [];
    var lib      = snap.exerciseLibrary || [];
    var tmpls    = snap.templates || [];

    log("── Clearing current data ────────────────────────", "info");

    // Delete all current data for this user
    var dels = await Promise.all([
      sb.from("sessions").delete().eq("user_id", userId),
      sb.from("templates").delete().eq("user_id", userId),
      sb.from("exercise_library").delete().eq("user_id", userId),
      sb.from("clients").delete().eq("user_id", userId),
    ]);
    var delErr = dels.find(function(r){ return r.error; });
    if (delErr) { log("✗ Clear failed: " + delErr.error.message, "err"); document.getElementById("restoreBtn").disabled = false; return; }
    log("✓ Current data cleared", "ok");

    log("── Restoring backup ─────────────────────────────", "info");

    // Re-insert clients
    if (clients.length > 0) {
      var clientRows = clients.map(function(c) {
        return { id: c.id, name: c.name, created_at: c.createdAt || new Date().toISOString(), user_id: userId };
      });
      var r = await sb.from("clients").insert(clientRows);
      if (r.error) { log("✗ Clients: " + r.error.message, "err"); document.getElementById("restoreBtn").disabled = false; return; }
      log("✓ " + clients.length + " clients restored", "ok");
    }

    // Re-insert sessions
    if (sessions.length > 0) {
      var sessionRows = sessions.map(function(s) {
        return { id: s.id, client_id: s.clientId || (s.clientIds && s.clientIds[0]) || null, client_ids: s.clientIds || [s.clientId], date: s.date, notes: s.notes || "", exercises: s.exercises || [], user_id: userId };
      });
      // Insert in chunks of 50 to avoid payload limits
      for (var i = 0; i < sessionRows.length; i += 50) {
        var chunk = sessionRows.slice(i, i + 50);
        var r2 = await sb.from("sessions").insert(chunk);
        if (r2.error) { log("✗ Sessions chunk " + i + ": " + r2.error.message, "err"); document.getElementById("restoreBtn").disabled = false; return; }
      }
      log("✓ " + sessions.length + " sessions restored", "ok");
    }

    // Re-insert exercise library
    if (lib.length > 0) {
      var libRows = lib.map(function(e) {
        return { id: e.id, name: e.name, pattern: e.pattern, unilateral: !!e.unilateral, user_id: userId };
      });
      var r3 = await sb.from("exercise_library").insert(libRows);
      if (r3.error) { log("✗ Library: " + r3.error.message, "err"); document.getElementById("restoreBtn").disabled = false; return; }
      log("✓ " + lib.length + " exercises restored", "ok");
    }

    // Re-insert templates
    if (tmpls.length > 0) {
      var tmplRows = tmpls.map(function(t) {
        return { id: t.id, name: t.name, exercises: t.exercises || [], client_id: t.client_id || null, user_id: userId };
      });
      var r4 = await sb.from("templates").insert(tmplRows);
      if (r4.error) { log("✗ Templates: " + r4.error.message, "err"); document.getElementById("restoreBtn").disabled = false; return; }
      log("✓ " + tmpls.length + " templates restored", "ok");
    }

    log("");
    log("✓ Restore complete! Refresh the app to see your data.", "ok");
    document.getElementById("restoreBtn").textContent = "✓ Done";
  }
</script>
</body>
</html>
