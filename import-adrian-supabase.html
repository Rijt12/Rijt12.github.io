<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <title>Import Adrian Nollen → Supabase</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
  <style>
    body { font-family: sans-serif; max-width: 520px; margin: 60px auto; padding: 20px; }
    input { display: block; width: 100%; padding: 10px; margin-bottom: 10px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { padding: 12px 24px; font-size: 15px; background: #dc4f2a; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
    button:disabled { background: #94a3b8; cursor: not-allowed; }
    #log { margin-top: 20px; font-size: 13px; line-height: 1.8; white-space: pre-wrap; }
    .ok   { color: #059669; }
    .err  { color: #dc2626; }
    .skip { color: #9ca3af; }
  </style>
</head>
<body>
  <h2>Import: Adrian Nollen</h2>
  <p style="font-size:13px;color:#666">Adds Adrian Nollen with 4 sessions (2025 – april 2026).</p>
  <div id="loginForm">
    <p>Log in with your Supabase account:</p>
    <input id="email" type="email" placeholder="Email address"/>
    <input id="password" type="password" placeholder="Password"/>
    <button onclick="doLogin()">Log in</button>
  </div>
  <div id="importSection" style="display:none">
    <button id="btn" onclick="runImport()">Import Adrian Nollen</button>
  </div>
  <div id="log"></div>
<script>
  var SUPABASE_URL      = 'https://skofblajffjorwprkknz.supabase.co';
  var SUPABASE_ANON_KEY = 'sb_publishable_QQLElZxZJFOV4IHpbtgQLQ_L3R8SnOh';
  var sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function log(msg, cls) {
    var el = document.getElementById("log");
    var span = document.createElement("span");
    span.className = cls || "";
    span.textContent = msg + "\n";
    el.appendChild(span);
  }

  function uid() { return Math.random().toString(36).slice(2) + Date.now().toString(36); }
  function makeEx(name, pattern, unilateral, sets, notes) {
    return { id: uid(), name: name, pattern: pattern,
             unilateral: !!unilateral, isUnilateralExercise: !!unilateral,
             performedUnilateral: false, sets: sets, notes: notes || "" };
  }
  function s(w, r) { return { weight: w, reps: r }; }

  async function doLogin() {
    var email = document.getElementById("email").value.trim();
    var pw    = document.getElementById("password").value;
    if (!email || !pw) { log("Enter email and password.", "err"); return; }
    var res = await sb.auth.signInWithPassword({ email: email, password: pw });
    if (res.error) { log("✗ " + res.error.message, "err"); return; }
    document.getElementById("loginForm").style.display = "none";
    document.getElementById("importSection").style.display = "block";
    log("✓ Logged in as " + res.data.user.email, "ok");
  }

  async function runImport() {
    document.getElementById("btn").disabled = true;
    var userRes = await sb.auth.getUser();
    if (userRes.error || !userRes.data.user) { log("Not logged in.", "err"); return; }
    var userId = userRes.data.user.id;

    log("Checking if Adrian already exists...");
    var existing = await sb.from("clients").select("id,name").eq("user_id", userId);
    if (existing.error) { log("✗ " + existing.error.message, "err"); document.getElementById("btn").disabled = false; return; }
    var existingClient = (existing.data || []).find(function(c){ return c.name.toLowerCase() === "adrian nollen"; });
    var clientId;
    if (existingClient) {
      clientId = existingClient.id;
      log("✓ Existing client found: " + existingClient.name + " — sessions will be added.", "ok");
    } else {
      clientId = uid();
      log("Creating client...");
      var clientRes = await sb.from("clients").insert([{ id: clientId, name: "Adrian Nollen", created_at: new Date().toISOString(), user_id: userId }]);
      if (clientRes.error) { log("✗ " + clientRes.error.message, "err"); document.getElementById("btn").disabled = false; return; }
      log("✓ Client created: Adrian Nollen", "ok");
    }

    var sessions = buildSessions(clientId);
    log("Inserting sessions (" + sessions.length + ")...");
    var sessionsToInsert = sessions.map(function(sess) {
      return { id: sess.id, client_id: clientId, client_ids: [clientId], date: sess.date, notes: sess.notes, exercises: sess.exercises, user_id: userId };
    });
    var sessRes = await sb.from("sessions").insert(sessionsToInsert);
    if (sessRes.error) { log("✗ " + sessRes.error.message, "err"); document.getElementById("btn").disabled = false; return; }
    log("✓ " + sessions.length + " sessions inserted", "ok");

    log("Checking exercise library...");
    var libRes = await sb.from("exercise_library").select("name").eq("user_id", userId);
    if (libRes.error) { log("✗ " + libRes.error.message, "err"); document.getElementById("btn").disabled = false; return; }
    var existingNames = (libRes.data || []).map(function(e){ return e.name.toLowerCase(); });

    var newLibExercises = [
      { name:"Split squat",              pattern:"Squat",    unilateral:true  },
      { name:"Goblet squat",             pattern:"Squat",    unilateral:false },
      { name:"Leg press linear",         pattern:"Squat",    unilateral:false },
      { name:"Leg extension",            pattern:"Isolatie", unilateral:false },
      { name:"Hip thrust",               pattern:"Hinge",    unilateral:false },
      { name:"Leg curl",                 pattern:"Isolatie", unilateral:false },
      { name:"Hip abductor",             pattern:"Isolatie", unilateral:false },
      { name:"Chin ups",                 pattern:"Pull",     unilateral:false },
      { name:"Lat pulldown (supinated)", pattern:"Pull",     unilateral:false },
      { name:"Cable row",                pattern:"Pull",     unilateral:false },
      { name:"High to low cable row",    pattern:"Pull",     unilateral:false },
      { name:"Bent over row",            pattern:"Pull",     unilateral:false },
      { name:"Face pull",                pattern:"Pull",     unilateral:false },
      { name:"Shoulder press",           pattern:"Push",     unilateral:false },
      { name:"Barbell bench press",      pattern:"Push",     unilateral:false },
      { name:"DB bench press",           pattern:"Push",     unilateral:false },
      { name:"Horizontal cable fly",     pattern:"Push",     unilateral:false },
      { name:"Incline push up",          pattern:"Push",     unilateral:false },
      { name:"Tricep extension cable",   pattern:"Isolatie", unilateral:true  },
      { name:"Bicep curls cable",        pattern:"Isolatie", unilateral:true  },
      { name:"DB bicep curls",           pattern:"Isolatie", unilateral:false },
      { name:"DB lateral raise",         pattern:"Isolatie", unilateral:false }
    ];

    var toAdd = newLibExercises.filter(function(e){ return !existingNames.includes(e.name.toLowerCase()); })
      .map(function(e){ return { id: uid(), name: e.name, pattern: e.pattern, unilateral: e.unilateral, user_id: userId }; });
    if (toAdd.length > 0) {
      var addRes = await sb.from("exercise_library").insert(toAdd);
      if (addRes.error) { log("✗ Bibliotheek: " + addRes.error.message, "err"); }
      else { log("✓ " + toAdd.length + " exercises added to library", "ok"); }
    } else {
      log("Library: all exercises already exist.", "skip");
    }

    log(""); sessions.forEach(function(s){ log("  ✓ " + s.notes, "ok"); }); log("");
    log("✓ Import complete! Refresh the app to see Adrian.", "ok");
    document.getElementById("btn").textContent = "✓ Done";
  }

  function buildSessions(clientId) {
    function sess(date, notes, exercises) {
      return { id: uid(), clientId: clientId, date: new Date(date).toISOString(), notes: notes, exercises: exercises };
    }
    return [
      sess("2025-12-01", "2025", [
        makeEx("Split squat",            "Squat",    true,  [s("8","10"),s("8","10"),s("8","10")]),
        makeEx("Goblet squat",           "Squat",    false, [s("20","12"),s("20","12")]),
        makeEx("Leg press linear",       "Squat",    false, [s("60","12"),s("60","12")]),

        makeEx("Tricep extension cable", "Isolatie", true,  [s("11,25","12")]),
        makeEx("Bicep curls cable",      "Isolatie", true,  [s("10","12")]),
        makeEx("DB bicep curls",         "Isolatie", false, [s("7","10")])
      ]),
      sess("2026-02-28", "Februari 2026", [
        makeEx("Split squat",            "Squat",    true,  [s("10","10"),s("10","10")]),
        makeEx("Goblet squat",           "Squat",    false, [s("20","12"),s("20","12")]),
        makeEx("Leg press linear",       "Squat",    false, [s("40","12"),s("40","12"),s("40","12")]),

        makeEx("Chin ups",               "Pull",     false, [s("14","10"),s("14","10")],   "PR 3"),
        makeEx("High to low cable row",  "Pull",     false, [s("15","10"),s("15","10"),s("15","10")]),
        makeEx("Cable row",              "Pull",     false, [s("20","10"),s("20","10"),s("20","10")]),
        makeEx("Shoulder press",         "Push",     false, [s("6","10"),s("6","10")],     "Half kneeling"),
        makeEx("DB lateral raise",       "Isolatie", false, [s("4","10"),s("4","10"),s("4","10")]),
        makeEx("Barbell bench press",    "Push",     false, [s("35","8")],                 "Smith machine"),
        makeEx("Incline push up",        "Push",     false, [s("","15"),s("","15"),s("","15")])
      ]),
      sess("2026-03-31", "Maart 2026", [
        makeEx("Split squat",            "Squat",    true,  [s("10","10"),s("10","10"),s("10","10")]),
        makeEx("Split squat",            "Squat",    true,  [s("12","10"),s("12","10")]),
        makeEx("Goblet squat",           "Squat",    false, [s("20","12")]),
        makeEx("Goblet squat",           "Squat",    false, [s("22","12"),s("22","12")]),
        makeEx("Leg press linear",       "Squat",    false, [s("60","12"),s("60","12"),s("60","12")]),
        makeEx("Leg extension",          "Isolatie", true,  [s("15","10"),s("15","10")]),
        makeEx("Hip thrust",             "Hinge",    false, [s("20","12"),s("20","12")]),
        makeEx("Hip thrust",             "Hinge",    false, [s("30","12")]),
        makeEx("Leg curl",               "Isolatie", false, [s("27,5","12"),s("27,5","12")]),
        makeEx("Leg curl",               "Isolatie", false, [s("30","10"),s("30","10")]),
        makeEx("Chin ups",               "Pull",     false, [s("14","12"),s("14","12")],   "PR 5"),
        makeEx("Chin ups",               "Pull",     false, [s("7","8"),s("7","8")]),
        makeEx("Chin ups",               "Pull",     false, [s("","6-8"),s("","6-8"),s("","6-8")], "Elastiek rood"),
        makeEx("High to low cable row",  "Pull",     false, [s("15","10"),s("15","10"),s("15","10")]),
        makeEx("Cable row",              "Pull",     false, [s("16","10"),s("16","10"),s("16","10")]),
        makeEx("Face pull",              "Pull",     false, [s("12,5","12"),s("12,5","12")]),
        makeEx("Barbell bench press",    "Push",     false, [s("30","8"),s("30","8")],     "Smith machine"),
        makeEx("DB bench press",         "Push",     false, [s("14","10"),s("14","10")]),
        makeEx("Horizontal cable fly",   "Push",     false, [s("5","10"),s("5","10"),s("5","10")]),
        makeEx("Incline push up",        "Push",     false, [s("","15"),s("","15"),s("","15")]),
        makeEx("Tricep extension cable", "Isolatie", true,  [s("11,25","10"),s("11,25","10"),s("11,25","10")]),
        makeEx("DB bicep curls",         "Isolatie", false, [s("7","10"),s("7","10"),s("7","10")]),
        makeEx("Bicep curls cable",      "Isolatie", true,  [s("10","12"),s("10","12"),s("10","12")])
      ]),
      sess("2026-04-30", "April 2026", [
        makeEx("Split squat",            "Squat",    true,  [s("14","10"),s("14","10")]),
        makeEx("Goblet squat",           "Squat",    false, [s("22","12"),s("22","12"),s("22","12")]),
        makeEx("Leg press linear",       "Squat",    false, [s("70","10"),s("70","10")]),
        makeEx("Leg extension",          "Isolatie", false, [s("35","12"),s("35","12")]),
        makeEx("Hip thrust",             "Hinge",    false, [s("30","12"),s("30","12")]),
        makeEx("Hip thrust",             "Hinge",    false, [s("35","12"),s("35","12")]),
        makeEx("Chin ups",               "Pull",     false, [s("","8-10"),s("","8-10"),s("","8-10")], "PR 6 / Elastiek geel"),

        makeEx("DB lateral raise",       "Isolatie", false, [s("4","10"),s("4","10"),s("4","10")])
      ])
    ];
  }
</script>
</body>
</html>
