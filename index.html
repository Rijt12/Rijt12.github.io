    function ProgressView(props) {
      var sessions=props.sessions;
      var clientId=props.clientId||null;
      var [period,setPeriod]=useState("all");
      var [search,setSearch]=useState("");
      var showSearch=props.showSearch||false;
      var searchRef=useRef(null);
      useEffect(function(){if(showSearch&&searchRef.current){searchRef.current.focus();}if(!showSearch){setSearch("");}}, [showSearch]);
      var now=new Date(); var cutoff=null;
      if(period==="1m"){cutoff=new Date(now);cutoff.setMonth(cutoff.getMonth()-1);}
      if(period==="3m"){cutoff=new Date(now);cutoff.setMonth(cutoff.getMonth()-3);}
      if(period==="6m"){cutoff=new Date(now);cutoff.setMonth(cutoff.getMonth()-6);}
      if(period==="1y"){cutoff=new Date(now);cutoff.setFullYear(cutoff.getFullYear()-1);}
      var filteredSessions=cutoff?sessions.filter(function(s){return new Date(s.date)>=cutoff;}):sessions;

      // performed=false → main entry only
      // performed=true  → sub-entry (uni) only, NOT in main
      var exerciseMap={};
      filteredSessions.forEach(function(s){
        s.exercises.forEach(function(ex){
          if(!exForClient(ex, s, clientId)){return;}
          if(ex.pattern==="Mobiliteit"){return;}
          var sets=setsForClient(ex, s, clientId);
          var maxWeight=Math.max.apply(null,sets.map(function(st){return parseW(st.weight)||0;}));
          var maxReps=Math.max.apply(null,sets.map(function(st){return parseInt(st.reps)||0;}));
          var maxRepsAtMax=Math.max.apply(null,sets.filter(function(st){return (parseW(st.weight)||0)===maxWeight;}).map(function(st){return parseInt(st.reps)||0;}));
          var vol=sets.reduce(function(sum,st){return sum+(parseW(st.weight)||0)*(parseInt(st.reps)||0);},0);
          var entry={date:s.date,maxWeight:maxWeight,maxReps:maxReps,maxRepsAtMax:maxRepsAtMax,totalVol:vol,sets:ex.sets};
          var performed=ex.performedUnilateral||false;
          var normalized=normalizeName(ex.name);
          if(performed){
            var uniKey=exNameKey(ex.name)+"__uni";
            if(!exerciseMap[uniKey]){exerciseMap[uniKey]={key:uniKey,name:normalized+" (uni)",baseName:normalized,pattern:ex.pattern,isSubEntry:true,entries:[]};}
            exerciseMap[uniKey].entries.push(entry);
          } else {
            var baseKey=exNameKey(ex.name);
            if(!exerciseMap[baseKey]){exerciseMap[baseKey]={key:baseKey,name:normalized,baseName:normalized,pattern:ex.pattern,isSubEntry:false,entries:[]};}
            exerciseMap[baseKey].entries.push(entry);
          }
        });
      });

      var exercises=Object.values(exerciseMap).sort(function(a,b){return a.name.localeCompare(b.name);});
      var filteredEx=search.trim()?exercises.filter(function(ex){return ex.name.toLowerCase().includes(search.toLowerCase());}):exercises;
      var periods=[["all","All"],["1m","1 mo"],["3m","3 mo"],["6m","6 mo"],["1y","1 yr"]];
      return (
        <div>
          <div style={{display:"flex",gap:5,padding:"12px 20px",borderBottom:"1px solid "+T.border,background:T.surface,flexWrap:"wrap"}}>
            {periods.map(function(item){var k=item[0],label=item[1],active=period===k;return <button key={k} onClick={function(){setPeriod(k);}} style={{padding:"5px 10px",fontSize:11,borderRadius:4,background:active?T.accent:"none",border:"1px solid "+(active?T.accent:T.border),color:active?"#fff":T.textMid,textTransform:"uppercase",letterSpacing:0.4}}>{label}</button>;})}
          </div>
          {showSearch&&(
          <div className="search-reveal" style={{padding:"10px 20px",borderBottom:"1px solid "+T.border,background:T.surface,position:"sticky",top:98,zIndex:38}}>
            <input ref={searchRef} value={search} onChange={function(e){setSearch(e.target.value);}} onBlur={function(){if(!search.trim()&&props.onHideSearch){props.onHideSearch();}}} placeholder="Search exercise..." style={{...iS,margin:0}}/>
          </div>
          )}
          {filteredEx.length===0&&<div style={{padding:"40px 20px",color:T.textMuted,fontSize:13,textAlign:"center"}}>{search?"No results.":"No data in this period."}</div>}
          {filteredEx.map(function(ex){
            var sorted=ex.entries.slice().sort(function(a,b){return new Date(a.date)-new Date(b.date);});
            var hasWeight=sorted.some(function(e){return e.maxWeight>0;});
            function setsAtW(entry){return (entry.sets||[]).filter(function(st){return (parseW(st.weight)||0)===entry.maxWeight;}).length;}
            var best=sorted.reduce(function(prev,cur){
              if(hasWeight){
                if(cur.maxWeight>prev.maxWeight){return cur;}
                if(cur.maxWeight===prev.maxWeight){
                  var cr=(cur.maxRepsAtMax||0),pr=(prev.maxRepsAtMax||0);
                  if(cr>pr){return cur;}
                  if(cr===pr&&setsAtW(cur)>setsAtW(prev)){return cur;}
                }
                return prev;
              }
              if(cur.maxReps>prev.maxReps){return cur;}
              if(cur.maxReps===prev.maxReps&&(cur.sets||[]).length>(prev.sets||[]).length){return cur;}
              return prev;
            },sorted[0]);
            var last=sorted[sorted.length-1],first=sorted[0];
            var diff=null;
            if(sorted.length>1){
              if(hasWeight){
                var wDiff=+(last.maxWeight-first.maxWeight).toFixed(1);
                var rDiff=(last.maxRepsAtMax||0)-(first.maxRepsAtMax||0);
                var sDiff=setsAtW(last)-setsAtW(first);
                diff={w:wDiff,r:rDiff,s:sDiff};
              } else {
                var repsDiff=last.maxReps-first.maxReps;
                var setsDiff=(last.sets||[]).length-(first.sets||[]).length;
                diff={r:repsDiff,s:setsDiff};
              }
            }
            var color=PC[ex.pattern]||T.textMuted;
            var bestSets=setsAtW(best);
            var bestLabel=hasWeight?fmtW(best.maxWeight)+"kg × "+(best.maxRepsAtMax||best.maxReps)+(bestSets>1?" ("+bestSets+"×)":""):best.maxReps+" reps";
            var indent=ex.isSubEntry;
            return (
              <div key={ex.key} className="rh" onClick={function(){props.onExHistory(ex.key);}} style={{padding:"14px 20px",borderBottom:"1px solid "+T.border,borderLeft:"3px solid "+color,cursor:"pointer",background:T.surface,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontWeight:500,fontSize:14,color:T.text}}>{ex.isSubEntry?ex.baseName:ex.name}{ex.isSubEntry&&<UniTag/>}</div>
                  <div style={{fontSize:10,color:color,textTransform:"uppercase",letterSpacing:0.4,marginTop:2}}>{ex.pattern} · {ex.entries.length}×</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:15,fontWeight:500}}>{bestLabel}</div>
                  {diff&&(hasWeight?(diff.w!==0||diff.r!==0):(diff.r!==0))&&(
                    <div style={{fontSize:11,display:"flex",gap:4,justifyContent:"flex-end"}}>
                      {hasWeight&&diff.w!==0&&<span style={{color:diff.w>0?"#059669":T.accent}}>{diff.w>0?"+":""}{fmtW(diff.w)}kg</span>}
                      {diff.r!==0&&<span style={{color:diff.r>0?"#059669":T.accent}}>{diff.r>0?"+":""}{diff.r} reps</span>}
                    </div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    function ExportView(props) {
      var client=props.client; var sessions=props.sessions;
      var [period,setPeriod]=useState("all");
      var sorted=sessions.slice().sort(function(a,b){return new Date(a.date)-new Date(b.date);});
      var filtered=sorted.filter(function(s){
        if(period==="all"){return true;}
        var d=new Date(s.date),now=new Date();
        if(period==="month"){return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}
        if(period==="3m"){return(now-d)/(1000*60*60*24*30)<=3;}
        if(period==="year"){return d.getFullYear()===now.getFullYear();}
        return true;
      });

      // Build per-exercise history map: name → sorted entries
      var histMap={};
      filtered.forEach(function(s){
        s.exercises.forEach(function(ex){
          var maxWeight=Math.max.apply(null,ex.sets.map(function(st){return parseW(st.weight)||0;}));
          var maxReps=Math.max.apply(null,ex.sets.map(function(st){return parseInt(st.reps)||0;}));
          var totalVol=ex.sets.reduce(function(sum,st){return sum+(parseW(st.weight)||0)*(parseInt(st.reps)||0);},0);
          var nk=exNameKey(ex.name);
          if(!histMap[nk]){histMap[nk]={name:normalizeName(ex.name),pattern:ex.pattern,unilateral:ex.unilateral||false,entries:[]};}
          histMap[nk].entries.push({date:s.date,maxWeight:maxWeight,maxReps:maxReps,totalVol:totalVol,sets:ex.sets});
        });
      });
      var exList=Object.values(histMap).sort(function(a,b){return a.name.localeCompare(b.name);});
      // Compute best per exercise
      exList.forEach(function(ex){
        ex.entries.sort(function(a,b){return new Date(a.date)-new Date(b.date);});
        var isBodyweight=ex.entries.every(function(e){return !e.maxWeight||e.maxWeight===0;});
        ex.isBodyweight=isBodyweight;
        ex.best=ex.entries.reduce(function(prev,cur){
          if(!prev){return cur;}
          if(isBodyweight){return cur.maxReps>prev.maxReps?cur:(cur.maxReps===prev.maxReps&&cur.sets.length>prev.sets.length?cur:prev);}
          return cur.maxWeight>prev.maxWeight?cur:(cur.maxWeight===prev.maxWeight&&cur.sets.length>prev.sets.length?cur:prev);
        },null);
      });

      // Build SVG line chart as an SVG string for PDF
      function buildChartSVG(ex,W,H){
        var entries=ex.entries; var isBodyweight=ex.isBodyweight;
        var PAD={t:18,r:14,b:28,l:32};
        var iW=W-PAD.l-PAD.r; var iH=H-PAD.t-PAD.b;
        var vals=entries.map(function(e){return isBodyweight?e.maxReps:(e.maxWeight||0);});
        var minV=Math.min.apply(null,vals); var maxV=Math.max.apply(null,vals)||1;
        var yMin=Math.max(0,minV-Math.ceil((maxV-minV)*0.1||1));
        var yMax=maxV+Math.ceil((maxV-yMin)*0.1||1);
        var pts=entries.map(function(e,i){
          var v=isBodyweight?e.maxReps:(e.maxWeight||0);
          var x=PAD.l+(entries.length<2?iW/2:i/(entries.length-1)*iW);
          var y=PAD.t+iH-(v>0?(v-yMin)/(yMax-yMin)*iH:0);
          return {x:x,y:y,v:v,e:e};
        });
        var polyline=pts.map(function(p){return p.x+","+p.y;}).join(" ");
        var area=pts.map(function(p,i){return (i===0?"M":"")+p.x+","+p.y;}).join(" ")+" L"+pts[pts.length-1].x+","+(PAD.t+iH)+" L"+pts[0].x+","+(PAD.t+iH)+" Z";
        var color=PC[ex.pattern]||"#dc4f2a";
        var yTicks=[yMin,Math.round(yMin+(yMax-yMin)/2),yMax].filter(function(v,i,a){return a.indexOf(v)===i;});
        var bestDate=ex.best?ex.best.date:null;
        var ticksHTML=yTicks.map(function(v){
          var y=PAD.t+iH-(v-yMin)/(yMax-yMin)*iH;
          return '<line x1="'+PAD.l+'" y1="'+y+'" x2="'+(PAD.l+iW)+'" y2="'+y+'" stroke="#e5e7eb" stroke-width="1"/>'
                +'<text x="'+(PAD.l-4)+'" y="'+(y+4)+'" text-anchor="end" font-size="8" fill="#9ca3af">'+Math.round(v)+'</text>';
        }).join("");
        var dotsHTML=pts.map(function(p){
          var isBest=bestDate&&p.e.date===bestDate;
          var lbl=isBodyweight?(p.v>0?p.v+" reps":""):(p.v>0?fmtW(p.v):"");
          return '<circle cx="'+p.x+'" cy="'+p.y+'" r="'+(isBest?5:3)+'" fill="'+(isBest?"#f59e0b":color)+'" stroke="white" stroke-width="1.5"/>'
                +(lbl?'<text x="'+p.x+'" y="'+(p.y-8)+'" text-anchor="middle" font-size="8" fill="'+(isBest?"#d97706":"#6b7280")+'" font-weight="'+(isBest?"600":"400")+'">'+lbl+'</text>':"")
                +'<text x="'+p.x+'" y="'+(H-3)+'" text-anchor="middle" font-size="7" fill="#9ca3af">'+new Date(p.e.date).toLocaleDateString("en-GB",{day:"2-digit",month:"short"})+'</text>';
        }).join("");
        return '<svg xmlns="http://www.w3.org/2000/svg" width="'+W+'" height="'+H+'" style="display:block;overflow:visible">'
              +ticksHTML
              +'<path d="'+area+'" fill="'+color+'" fill-opacity="0.1"/>'
              +'<polyline points="'+polyline+'" fill="none" stroke="'+color+'" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>'
              +dotsHTML
              +'</svg>';
      }

      function buildPDF(){
        var rangeLabel=period==="all"?"All sessions":period==="month"?"This month":period==="3m"?"Last 3 months":"This year";
        var patternColors=PC;
        var cardsHTML=exList.map(function(ex){
          var color=patternColors[ex.pattern]||"#dc4f2a";
          var bestVal=ex.best?(ex.isBodyweight?(ex.best.maxReps>0?ex.best.maxReps+" reps":"—"):(ex.best.maxWeight>0?fmtW(ex.best.maxWeight)+" kg":"—")):"—";
          var bestDateStr=ex.best?fmtDate(ex.best.date):"";
          var setsHTML=ex.best?ex.best.sets.map(function(s,i){
            return '<span style="font-size:10px;padding:2px 6px;background:#f3f4f6;border:1px solid #e5e7eb;border-radius:3px;margin:2px;display:inline-block">'+(i+1)+'. '+(s.weight?s.weight+'kg':'—')+' × '+(s.reps||'—')+'</span>';
          }).join(""):"";
          return '<div style="border:1px solid #e5e7eb;border-left:4px solid '+color+';border-radius:6px;padding:14px 16px;break-inside:avoid;background:#fff">'
                +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">'
                +'<div><div style="font-weight:600;font-size:13px;color:#111">'+(ex.name)+'</div>'
                +'<div style="font-size:10px;color:'+color+';text-transform:uppercase;letter-spacing:0.4px;margin-top:2px">'+ex.pattern+'</div>'
                +(bestDateStr?'<div style="font-size:10px;color:#9ca3af;margin-top:2px">Best session: '+bestDateStr+'</div>':'')
                +'</div>'
                +'<div style="text-align:right"><div style="font-size:18px;font-weight:700;color:#111">'+bestVal+'</div>'
                +(ex.best&&ex.best.totalVol>0?'<div style="font-size:10px;color:#9ca3af">'+ex.best.totalVol.toLocaleString("en-GB")+' vol.</div>':"")
                +'</div></div>'
                +(setsHTML?'<div>'+setsHTML+'</div>':"")
                +'</div>';
        }).join("");
        var html='<!DOCTYPE html><html><head><meta charset="utf-8">'
          +'<title>Export '+client.name+'</title>'
          +'<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Raleway:wght@700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">'
          +'<style>'
          +'*{box-sizing:border-box;margin:0;padding:0}'
          +'body{font-family:\'Inter\',sans-serif;background:#f9fafb;color:#111;padding:24px;max-width:860px;margin:0 auto}'
          +'.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}'
          +'@media print{body{background:#fff;padding:16px}.grid{grid-template-columns:1fr 1fr}.no-print{display:none!important}}'
          +'</style></head><body>'
          +'<div class="no-print" style="margin-bottom:16px"><button onclick="window.close()" style="font-family:\'Inter\',sans-serif;font-size:12px;padding:7px 14px;border:1px solid #e5e7eb;border-radius:5px;background:#fff;cursor:pointer;color:#374151">← Back to app</button></div>'
          +'<div style="margin-bottom:20px;padding-bottom:14px;border-bottom:2px solid #e5e7eb">'
          +'<div style="font-family:\'Raleway\',sans-serif;font-size:24px;font-weight:800;letter-spacing:1px;text-transform:uppercase">'+client.name+'</div>'
          +'<div style="font-size:11px;color:#6b7280;margin-top:4px">Progress report · '+rangeLabel+' · '+fmtDate(new Date().toISOString())+'</div>'
          +'</div>'
          +'<div class="grid">'+cardsHTML+'</div>'
          +'<script>window.onload=function(){window.print();}<\/script>'
          +'</body></html>';
        var win=window.open("","_blank");
        if(win){win.document.write(html);win.document.close();}
      }

      return (
        <div className="ai" style={{padding:20,paddingBottom:40}}>
          <div style={{fontSize:12,color:T.textMid,marginBottom:14,lineHeight:1.6}}>Progress report per exercise with line charts, export as PDF via the print dialog.</div>
          <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>
            {[["all","All"],["year","This year"],["3m","Last 3 mo"],["month","This month"]].map(function(item){return <button key={item[0]} onClick={function(){setPeriod(item[0]);}} style={{padding:"6px 12px",fontSize:11,textTransform:"uppercase",letterSpacing:0.4,borderRadius:4,background:period===item[0]?T.accent:T.surface,border:"1px solid "+(period===item[0]?T.accent:T.border),color:period===item[0]?"#fff":T.textMid}}>{item[1]}</button>;})}
          </div>
          <Btn accent onClick={buildPDF} style={{marginBottom:16}}>Download PDF</Btn>
          {exList.length===0&&<div style={{color:T.textMuted,fontSize:13,textAlign:"center",padding:"20px 0"}}>No sessions in this period.</div>}
          {exList.map(function(ex,i){
            var color=PC[ex.pattern]||T.textMuted;
            var bestVal=ex.best?(ex.isBodyweight?(ex.best.maxReps>0?ex.best.maxReps+" reps":"—"):(ex.best.maxWeight>0?fmtW(ex.best.maxWeight)+" kg":"—")):"—";
            return(
            <div key={i} style={{background:T.surface,border:"1px solid "+T.border,borderLeft:"3px solid "+color,marginBottom:8,padding:"12px 16px",borderRadius:4}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div><div style={{fontWeight:500,fontSize:13}}>{ex.name}{ex.unilateral&&<UniTag/>}</div><div style={{fontSize:10,color:color,textTransform:"uppercase",letterSpacing:0.4,marginTop:1}}>{ex.pattern}</div>{ex.best&&<div style={{fontSize:10,color:T.textMuted,marginTop:2}}>Best session: {fmtDate(ex.best.date)}</div>}</div>
                <div style={{textAlign:"right"}}><div style={{fontSize:16,fontWeight:600}}>{bestVal}</div>{ex.best&&ex.best.totalVol>0&&<div style={{fontSize:10,color:T.textMuted}}>{ex.best.totalVol.toLocaleString("en-GB")} vol.</div>}</div>
              </div>
              {ex.best&&<div style={{display:"flex",gap:5,flexWrap:"wrap",marginTop:8}}>{ex.best.sets.map(function(s,si){return <span key={si} style={{fontSize:11,padding:"3px 7px",background:T.surfaceAlt,border:"1px solid "+T.border,borderRadius:4,color:T.textMid}}>{si+1}. {s.weight?s.weight+"kg":"—"} × {s.reps||"—"}</span>;})}</div>}
            </div>
          );})}
        </div>
      );
    }

    // ── Login screen ──────────────────────────────────────────────────────────
    function LoginScreen(props) {
      var [email,setEmail]       = useState("");
      var [password,setPassword] = useState("");
      var [error,setError]       = useState("");
      var [loading,setLoading]   = useState(false);

      async function handleLogin(e) {
        e.preventDefault();
        if (!email.trim() || !password) { return; }
        setLoading(true); setError("");
        try {
          await window._fbLogin(email.trim(), password);
        } catch(err) {
          setError("Verkeerd e-mailadres of wachtwoord.");
          setLoading(false);
        }
      }

      return (
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:T.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:24,fontFamily:"'Inter',sans-serif",overflow:"hidden"}}>
          <style dangerouslySetInnerHTML={{__html:`@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Barlow+Condensed:wght@700;800&display=swap');*{box-sizing:border-box;margin:0;padding:0}input:focus{outline:none;border-color:#dc4f2a!important}`}}/>
          <div style={{width:"100%",maxWidth:360}}>
            <div style={{fontFamily:"'Raleway',sans-serif",fontWeight:800,fontSize:32,letterSpacing:1,textTransform:"uppercase",color:T.text,marginBottom:8}}>Trainer App</div>
            <div style={{fontSize:12,color:T.textMuted,marginBottom:32,letterSpacing:0.3}}>Log in om door te gaan</div>
            <div style={{marginBottom:14}}>
              <div style={{fontSize:10,color:T.textMuted,textTransform:"uppercase",letterSpacing:0.6,marginBottom:5}}>Email</div>
              <input type="email" value={email} onChange={function(e){setEmail(e.target.value);}} placeholder="jouw@email.com" style={{...iS}} autoComplete="email"/>
            </div>
            <div style={{marginBottom:20}}>
              <div style={{fontSize:10,color:T.textMuted,textTransform:"uppercase",letterSpacing:0.6,marginBottom:5}}>Password</div>
              <input type="password" value={password} onChange={function(e){setPassword(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter"){handleLogin(e);}}} placeholder="••••••••" style={{...iS}} autoComplete="current-password"/>
            </div>
            {error && <div style={{fontSize:12,color:T.danger,marginBottom:14}}>{error}</div>}
            <button onClick={handleLogin} disabled={loading} style={{width:"100%",padding:"12px",fontSize:12,background:T.accent,border:"none",color:"#fff",textTransform:"uppercase",letterSpacing:0.8,cursor:"pointer",borderRadius:4,opacity:loading?0.6:1}}>
              {loading?"Logging in...":"Log in"}
            </button>
          </div>
        </div>
      );
    }

    // ── Root — handles auth state ──────────────────────────────────────────────
    function Root() {
      var [user, setUser] = useState(undefined);

      useEffect(function() {
        window._fbOnAuth(function(u) {
          setUser(u);
          if (u) { window.scrollTo(0,0); }
        });
      }, []);

      // Swipe down from top = reload
      useEffect(function() {
        var startX=0, startY=0;
        function onStart(e){if(!e.touches||!e.touches[0]){return;}startX=e.touches[0].clientX;startY=e.touches[0].clientY;}
        function onEnd(e){
          if(!e.changedTouches||!e.changedTouches[0]){return;}
          var dx=e.changedTouches[0].clientX-startX;
          var dy=e.changedTouches[0].clientY-startY;
          if(dy>80&&Math.abs(dy)>Math.abs(dx)*1.5&&startY<80){window.location.reload();}
        }
        document.addEventListener("touchstart",onStart,{passive:true});
        document.addEventListener("touchend",onEnd,{passive:true});
        return function(){document.removeEventListener("touchstart",onStart);document.removeEventListener("touchend",onEnd);};
      }, []);

      if (user === undefined) {
        return <div style={{minHeight:"100vh",background:T.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8}}><div style={{fontFamily:"'Raleway',sans-serif",fontWeight:800,fontSize:48,letterSpacing:1,color:T.text,textTransform:"uppercase"}}>Trainer App</div><div style={{fontFamily:"'Inter',sans-serif",fontWeight:300,fontSize:11,color:T.textMuted,letterSpacing:2,textTransform:"uppercase"}}>by MVDRPT</div></div>;
      }
      if (!user) { return <LoginScreen/>; }
      return <App onLogout={function(){ window._fbLogout(); }}/>;
    }

    // ── Mount ──────────────────────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<Root/>);
  </script>
</body>
