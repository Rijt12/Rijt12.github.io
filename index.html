  <script>
    // Scroll focused input above keyboard
    function scrollFocusedAboveKeyboard() {
      var el = document.activeElement;
      if (!el || (el.tagName !== 'INPUT' && el.tagName !== 'TEXTAREA')) { return; }
      setTimeout(function() {
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 120);
    }
    document.addEventListener('focusin', scrollFocusedAboveKeyboard);
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', function() {
        var el = document.activeElement;
        if (!el || (el.tagName !== 'INPUT' && el.tagName !== 'TEXTAREA')) { return; }
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      });
    }
  </script>
  <script>
    (function() {
      var SUPABASE_URL      = 'https://skofblajffjorwprkknz.supabase.co';
      var SUPABASE_ANON_KEY = 'sb_publishable_QQLElZxZJFOV4IHpbtgQLQ_L3R8SnOh';

      var sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      // Previous loaded data for diffing in _fbSave
      var _prevData = null;

      // ── Auth ──────────────────────────────────────────────────────────────────
      var _authResolved = false;
      var _authUser     = null;
      var _authCb       = null;

      sb.auth.onAuthStateChange(function(event, session) {
        _authResolved = true;
        _authUser = session ? session.user : null;
        if (_authCb) { _authCb(_authUser); }
      });

      window._fbOnAuth = function(cb) {
        _authCb = cb;
        if (_authResolved) { cb(_authUser); }
      };

      window._fbLogin = function(email, pw) {
        return sb.auth.signInWithPassword({ email: email, password: pw })
          .then(function(res) {
            if (res.error) throw res.error;
            return res;
          });
      };

      window._fbLogout = function() {
        return sb.auth.signOut().then(function(res) {
          if (res.error) throw res.error;
          return res;
        });
      };

      // ── Daily backup ──────────────────────────────────────────────────────────
      async function _maybeBackup(data, userId) {
        try {
          var todayStart = new Date();
          todayStart.setHours(0, 0, 0, 0);
          var res = await sb
            .from('backups')
            .select('id')
            .eq('user_id', userId)
            .gte('created_at', todayStart.toISOString())
            .limit(1);
          if (res.error) { console.warn('backup check error', res.error); return; }
          if (!res.data || res.data.length === 0) {
            await sb.from('backups').insert({ snapshot: data, user_id: userId });
          }
        } catch(e) { console.warn('backup error', e); }
      }

      // ── Load ──────────────────────────────────────────────────────────────────
      window._fbLoad = async function() {
        try {
          var userRes = await sb.auth.getUser();
          if (userRes.error || !userRes.data.user) { console.error('not authenticated'); return null; }
          var user = userRes.data.user;

          var results = await Promise.all([
            sb.from('clients').select('*').eq('user_id', user.id),
            sb.from('sessions').select('*').eq('user_id', user.id),
            sb.from('exercise_library').select('*').eq('user_id', user.id),
            sb.from('templates').select('*').eq('user_id', user.id)
          ]);

          var e1 = results[0].error, e2 = results[1].error,
              e3 = results[2].error, e4 = results[3].error;
          if (e1 || e2 || e3 || e4) {
            console.error('load error', e1, e2, e3, e4);
            return null;
          }

          var clientRows = results[0].data || [];
          var sessionRows = results[1].data || [];
          var libRows = results[2].data || [];
          var tmplRows = results[3].data || [];

          var data = {
            clients: clientRows.map(function(r) {
              return { id: r.id, name: r.name, createdAt: r.created_at };
            }),
            sessions: sessionRows.map(function(r) {
              return {
                id: r.id,
                clientId: r.client_id,
                clientIds: r.client_ids || [],
                date: r.date,
                notes: r.notes,
                exercises: r.exercises || []
              };
            }),
            exerciseLibrary: libRows.map(function(r) {
              return { id: r.id, name: r.name, pattern: r.pattern, unilateral: r.unilateral };
            }),
            templates: tmplRows.map(function(r) {
              return { id: r.id, name: r.name, exercises: r.exercises || [], client_id: r.client_id || null };
            })
          };

          _prevData = JSON.parse(JSON.stringify(data));
          await _maybeBackup(data, user.id);
          return data;
        } catch(e) { console.error('load error', e); return null; }
      };

      // ── Save ──────────────────────────────────────────────────────────────────
      window._fbSave = async function(data) {
        try {
          var userRes = await sb.auth.getUser();
          if (userRes.error || !userRes.data.user) { console.error('not authenticated'); return; }
          var uid = userRes.data.user.id;

          var prev = _prevData || { clients: [], sessions: [], exerciseLibrary: [], templates: [] };

          function idSet(arr) {
            var s = new Set();
            (arr || []).forEach(function(x) { s.add(x.id); });
            return s;
          }

          // --- clients ---
          var clientUpserts = (data.clients || []).map(function(c) {
            return { id: c.id, name: c.name, created_at: c.createdAt, user_id: uid };
          });
          var removedClients = (prev.clients || [])
            .filter(function(c) { return !idSet(data.clients).has(c.id); })
            .map(function(c) { return c.id; });

          // --- sessions ---
          var sessionUpserts = (data.sessions || []).map(function(s) {
            return {
              id: s.id,
              client_id: s.clientId || null,
              client_ids: s.clientIds || [],
              date: s.date || null,
              notes: s.notes || null,
              exercises: s.exercises || [],
              user_id: uid
            };
          });
          var removedSessions = (prev.sessions || [])
            .filter(function(s) { return !idSet(data.sessions).has(s.id); })
            .map(function(s) { return s.id; });

          // --- exerciseLibrary ---
          var libUpserts = (data.exerciseLibrary || []).map(function(e) {
            return { id: e.id, name: e.name, pattern: e.pattern, unilateral: !!e.unilateral, user_id: uid };
          });
          var removedLib = (prev.exerciseLibrary || [])
            .filter(function(e) { return !idSet(data.exerciseLibrary).has(e.id); })
            .map(function(e) { return e.id; });

          // --- templates ---
          var tmplUpserts = (data.templates || []).map(function(t) {
            return { id: t.id, name: t.name, exercises: t.exercises || [], user_id: uid, client_id: t.client_id || null };
          });
          var removedTmpl = (prev.templates || [])
            .filter(function(t) { return !idSet(data.templates).has(t.id); })
            .map(function(t) { return t.id; });

          var ops = [];
          if (clientUpserts.length)
            ops.push(sb.from('clients').upsert(clientUpserts));
          if (removedClients.length) {
            var now = new Date().toISOString();
            var archiveRows = removedClients.map(function(cid) {
              var c = (prev.clients || []).find(function(x){ return x.id === cid; }) || {};
              return { id: cid, name: c.name || null, archived_at: now, user_id: uid };
            });
            ops.push(sb.from('archived_clients').upsert(archiveRows));
            ops.push(sb.from('clients').delete().in('id', removedClients).eq('user_id', uid));
          }
          if (sessionUpserts.length)
            ops.push(sb.from('sessions').upsert(sessionUpserts));
          if (removedSessions.length)
            ops.push(sb.from('sessions').delete().in('id', removedSessions).eq('user_id', uid));
          if (libUpserts.length)
            ops.push(sb.from('exercise_library').upsert(libUpserts));
          if (removedLib.length)
            ops.push(sb.from('exercise_library').delete().in('id', removedLib).eq('user_id', uid));
          if (tmplUpserts.length)
            ops.push(sb.from('templates').upsert(tmplUpserts));
          if (removedTmpl.length)
            ops.push(sb.from('templates').delete().in('id', removedTmpl).eq('user_id', uid));

          if (ops.length === 0) return;
          console.log('sync: removedClients=', removedClients, 'ops=', ops.length);
          var results = await Promise.all(ops);
          results.forEach(function(r,i){ if(r&&r.error){console.error('op['+i+'] error:', r.error);} else {console.log('op['+i+'] ok');} });
          var errs = results.filter(function(r) { return r && r.error; });
          if (errs.length) { console.error('save errors', errs.map(function(r){ return r.error; })); return; }

          _prevData = JSON.parse(JSON.stringify(data));
        } catch(e) { console.error('save error', e); }
      };
    })();
  </script>
</head>
<body style="margin:0;padding:0;background:#f5f3ef;overflow-x:hidden;">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ── Storage via Firebase ───────────────────────────────────────────────────
    const EMPTY = { clients:[], sessions:[], exerciseLibrary:[], templates:[] };

    async function loadData() {
      try {
        var result = await window._fbLoad();
        // Return a flag so we know load succeeded (even if document was empty)
        return { data: result || EMPTY, ok: true };
      } catch(e) { return { data: EMPTY, ok: false }; }
    }

    async function saveData(d) {
      if (!window._fbSave) { return; }
      try { await window._fbSave(d); }
      catch(e) { console.error(e); }
    }

    // Parses weight strings like "37,5" or "2x16" → numeric value
    function parseW(str) {
      if(!str){return 0;}
      var s=String(str).replace(",",".").trim();
      if(/^2x/i.test(s)){s=s.slice(2);}
      return parseFloat(s)||0;
    }

    function fmtW(w) {
      var n=parseW(w);
      if(n===Math.floor(n)){return String(Math.floor(n));}
      var s=n.toFixed(2);
      // strip trailing zero after decimal: 37.50 → 37,5  but 37.55 → 37,55
      s=s.replace(/\.?0+$/,"");
      return s.replace(".",",");
    }

    // Normalize exercise name: first letter of full name uppercase, rest lowercase,
    // but preserve known all-caps tokens (DB, RDL, EMOM, …).
    var CAPS_TOKENS=["DB","RDL","EMOM","BB","KB","TRX"];
    function normalizeName(str){
      if(!str){return "";}
      var parts=str.trim().split(/\s+/);
      var out=parts.map(function(w,i){
        var up=w.toUpperCase();
        if(CAPS_TOKENS.indexOf(up)!==-1){return up;}
        var word=w.toLowerCase();
        return i===0?word.charAt(0).toUpperCase()+word.slice(1):word;
      });
      return out.join(" ");
    }
    // Case-insensitive key for grouping
    function exNameKey(name){return name.trim().toLowerCase();}

    // ── Constants ──────────────────────────────────────────────────────────────
    const PATTERNS = ["Push","Pull","Hinge","Squat","Carry","Core","Isolatie","Mobiliteit","Machine"];
    const PC = {
      Push:"#dc4f2a", Pull:"#2563eb", Hinge:"#d97706", Squat:"#059669",
      Carry:"#7c3aed", Core:"#db2777", Isolatie:"#0891b2", Mobiliteit:"#0d9488", Machine:"#64748b"
    };
    const T = {
      bg:"#f5f3ef", surface:"#ffffff", surfaceAlt:"#faf9f7",
      border:"#e5e1da", borderStrong:"#d0cbc2",
      text:"#1c1917", textMid:"#57534e", textMuted:"#a8a29e",
      accent:"#dc4f2a", accentBg:"#fef2ee", danger:"#dc2626",
    };

    // ── Utils ──────────────────────────────────────────────────────────────────
    function uid() { return Math.random().toString(36).slice(2,10); }
    function fmtDate(iso) {
      return new Date(iso).toLocaleDateString("en-GB", {day:"2-digit", month:"short", year:"numeric"});
    }
    function toLocalISO(iso) {
      const d = new Date(iso);
      return new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().slice(0,10);
    }

    function isDuo(s) { return s.clientIds && s.clientIds.length > 1; }
    function exForClient(ex, s, clientId) {
      return true;
    }
    function setsForClient(ex, s, clientId) {
      if (!isDuo(s)) { return ex.sets; }
      return s.clientIds[0] === clientId ? ex.sets : (ex.setsB || ex.sets);
    }

    // ── Confirm dialog ─────────────────────────────────────────────────────────
    function ConfirmDialog(props) {
      return (
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.45)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
          <div style={{background:T.surface,borderRadius:4,padding:24,maxWidth:320,width:"100%",boxShadow:"0 8px 32px rgba(0,0,0,0.18)"}}>
            <div style={{fontSize:14,color:T.text,lineHeight:1.6,marginBottom:20}}>{props.msg}</div>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
              <button onClick={props.onCancel} style={{padding:"8px 16px",fontSize:12,background:"none",border:"1px solid "+T.border,color:T.textMid,borderRadius:4,cursor:"pointer",textTransform:"uppercase",letterSpacing:0.4}}>Cancel</button>
              <button onClick={props.onConfirm} style={{padding:"8px 16px",fontSize:12,background:T.danger,border:"none",color:"#fff",borderRadius:4,cursor:"pointer",textTransform:"uppercase",letterSpacing:0.4}}>Delete</button>
            </div>
          </div>
        </div>
      );
    }

    // ── App ────────────────────────────────────────────────────────────────────
    function App(props) {
      var [data, setData]                     = useState(null);
      var [view, setView]                     = useState("clients");
      var [activeClientId, setActiveClientId] = useState(null);
      var [activeSession, setActiveSession]   = useState(function(){try{var s=localStorage.getItem("activeSession");return s?JSON.parse(s):null;}catch(e){return null;}});
      var [viewSessionId, setViewSessionId]   = useState(null);
      var [editingTpl, setEditingTpl]         = useState(null);
      var [tplClientId, setTplClientId]       = useState(null);
      var [exHistoryName, setExHistoryName]   = useState(null);
      var [prevView, setPrevView]             = useState("client");
      var [clientTab, setClientTab]           = useState("Sessions");
      var [toast, setToast]                   = useState(null);
      var [dlg, setDlg]                       = useState(null);
      var [saving, setSaving]                 = useState(false);
      var [navKey, setNavKey]                 = useState(0);
      var [showSearch, setShowSearch]         = useState(false);
      var [libTriggerAdd, setLibTriggerAdd]   = useState(false);
      function handlePullSearch(){setShowSearch(true);}

      useEffect(function() {
        Promise.all([loadData(), new Promise(function(r){ setTimeout(r, 800); })]).then(function(res){
          var result=res[0];
          setData(result.data);
          // Only seed if Firestore load succeeded AND data is truly empty (first-time setup)
          if(result.ok && result.data.clients.length===0 && (result.data.exerciseLibrary||[]).length===0){
            var seeded=buildSeed();
            setData(seeded);
            saveData(seeded);
          }
        });
      }, []);

      // Ref zodat callbacks altijd de laatste data hebben
      var dataRef = useRef(data);
      useEffect(function() { dataRef.current = data; }, [data]);

      // Persist activeSession in localStorage so it survives app restart
      useEffect(function(){
        try{
          if(activeSession){localStorage.setItem("activeSession",JSON.stringify(activeSession));}
          else{localStorage.removeItem("activeSession");}
        }catch(e){}
      },[activeSession]);

      // Auto-save active session while editing
      var autoSaveRef = useRef(null);
      useEffect(function() {
        if (!activeSession) { return; }
        if (view !== "session" && view !== "editSession") { return; }
        clearTimeout(autoSaveRef.current);
        autoSaveRef.current = setTimeout(function() {
          var d = dataRef.current;
          if (!d) { return; }
          var hasData = activeSession.exercises.some(function(ex) {
            var allSets = (ex.sets||[]).concat(ex.setsB||[]);
            return allSets.some(function(s){ return (s.weight&&s.weight.trim()) || (s.reps&&s.reps.trim()); });
          });
          if (!hasData) { return; }
          var newSessions = d.sessions.filter(function(s){ return s.id !== activeSession.id; });
          newSessions.push(activeSession);
          var newData = {...d, sessions: newSessions};
          setData(newData);
          saveData(newData);
        }, 1500);
        return function() { clearTimeout(autoSaveRef.current); };
      }, [activeSession]);

      // goBack: navigeer terug op basis van huidige view
      var goBackRef = useRef(null);
      goBackRef.current = function() {
        if (view === "clients")                              { return; }
        if (view === "library")                              { goView("clients"); return; }
        if (view === "templates" && editingTpl)              { setEditingTpl(null); if(tplClientId){goView("client");}return; }
        if (view === "templates")                            { if(tplClientId){goView("client");}else{goView("clients");}return; }
        if (view === "loadTemplate")                         { goView("client"); return; }
        if (view === "client")                               { goView("clients"); return; }
        if (view === "session" || view === "editSession")    { goView("client"); return; }
        if (view === "viewSession")                          { goView("client"); return; }
        if (view === "exHistory")                            { goView(prevView); return; }
        if (view === "export")                               { goView("client"); return; }
      };

      // Swipe left = terug
      useEffect(function() {
        var startX=0, startY=0;
        function onStart(e) {
          var tag = e.target.tagName;
          if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") { startX = null; return; }
          if (!e.touches || !e.touches[0]) { return; }
          startX = e.touches[0].clientX; startY = e.touches[0].clientY;
          if (startX > 40) { startX = null; return; }
        }
        function onEnd(e) {
          if (startX === null) { return; }
          if (!e.changedTouches || !e.changedTouches[0]) { return; }
          var dx = e.changedTouches[0].clientX - startX;
          var dy = e.changedTouches[0].clientY - startY;
          if (dx > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) { goBackRef.current(); }
        }
        document.addEventListener("touchstart", onStart, {passive:true});
        document.addEventListener("touchend",   onEnd,   {passive:true});
        return function() {
          document.removeEventListener("touchstart", onStart);
          document.removeEventListener("touchend",   onEnd);
        };
      }, []);

      if (!data) { return <Loader />; }

      function persist(d) {
        setData(d);
        setSaving(true);
        saveData(d).then(function(){ setSaving(false); });
      }

      // Sla sessie stil op (bij terugknop), voegt ook nieuwe oefeningen toe aan bibliotheek
      function saveSessionSilent(session) {
        if (!session) { return; }
        var d = dataRef.current;
        if (!d) { return; }
        var library = d.exerciseLibrary || [];
        var newExs = [];
        session.exercises.forEach(function(ex) {
          var found = library.some(function(l){ return l.name.toLowerCase() === ex.name.toLowerCase(); });
          if (!found) { newExs.push({id:uid(), name:ex.name, pattern:ex.pattern, unilateral:ex.unilateral||false}); }
        });
        var newSessions = d.sessions.filter(function(s){ return s.id !== session.id; });
        newSessions.push(session);
        var newData = {...d, sessions: newSessions, exerciseLibrary: library.concat(newExs)};
        setData(newData);
        saveData(newData);
      }

      function buildSeed() {
        var defaultLib = [
          {id:uid(),name:"Goblet squat",         pattern:"Squat",    unilateral:false},
          {id:uid(),name:"Split squat",          pattern:"Squat",    unilateral:false},
          {id:uid(),name:"Romanian deadlift",    pattern:"Hinge",    unilateral:false},
          {id:uid(),name:"Hip thrust",           pattern:"Hinge",    unilateral:false},
          {id:uid(),name:"Push up",              pattern:"Push",     unilateral:false},
          {id:uid(),name:"DB bench press",       pattern:"Push",     unilateral:false},
          {id:uid(),name:"Chin up",              pattern:"Pull",     unilateral:false},
          {id:uid(),name:"Lat pulldown",         pattern:"Pull",     unilateral:false},
          {id:uid(),name:"High to low cable row",pattern:"Pull",     unilateral:false},
          {id:uid(),name:"Leg extension",        pattern:"Isolatie", unilateral:true},
          {id:uid(),name:"Leg curl",             pattern:"Isolatie", unilateral:false},
        ];
        var markId = uid();
        var mark = {id:markId, name:"Mark", createdAt:"2026-04-01T09:00:00.000Z"};
        function sets3(w,r){return [{weight:String(w),reps:String(r)},{weight:String(w),reps:String(r)},{weight:String(w),reps:String(r)}];}
        var s1={id:uid(),clientId:markId,date:"2026-04-07T10:00:00.000Z",notes:"First session, good workout.",exercises:[
          {id:uid(),name:"Goblet squat",      pattern:"Squat",unilateral:false,sets:sets3(16,10),notes:""},
          {id:uid(),name:"Romanian deadlift", pattern:"Hinge", unilateral:false,sets:sets3(30,10),notes:""},
          {id:uid(),name:"DB bench press",    pattern:"Push",  unilateral:false,sets:sets3(14,10),notes:""},
          {id:uid(),name:"Lat pulldown",      pattern:"Pull",  unilateral:false,sets:sets3(35,10),notes:""},
        ]};
        var s2={id:uid(),clientId:markId,date:"2026-05-05T10:00:00.000Z",notes:"Good progress on squat.",exercises:[
          {id:uid(),name:"Goblet squat",      pattern:"Squat",unilateral:false,sets:sets3(18,10),notes:""},
          {id:uid(),name:"Romanian deadlift", pattern:"Hinge", unilateral:false,sets:sets3(32,10),notes:""},
          {id:uid(),name:"DB bench press",    pattern:"Push",  unilateral:false,sets:sets3(16,10),notes:""},
          {id:uid(),name:"Lat pulldown",      pattern:"Pull",  unilateral:false,sets:sets3(37,10),notes:""},
        ]};
        var s3={id:uid(),clientId:markId,date:"2026-06-02T10:00:00.000Z",notes:"PR op bench press!",exercises:[
          {id:uid(),name:"Goblet squat",      pattern:"Squat",unilateral:false,sets:sets3(20,10),notes:""},
          {id:uid(),name:"Romanian deadlift", pattern:"Hinge", unilateral:false,sets:sets3(35,10),notes:"Felt heavy but good"},
          {id:uid(),name:"DB bench press",    pattern:"Push",  unilateral:false,sets:sets3(18,10),notes:"PR!"},
          {id:uid(),name:"Lat pulldown",      pattern:"Pull",  unilateral:false,sets:sets3(40,10),notes:""},
        ]};
        return {clients:[mark],sessions:[s1,s2,s3],exerciseLibrary:defaultLib,templates:[]};
      }

      function showToast(msg) {
        setToast(msg);
        setTimeout(function() { setToast(null); }, 2500);
      }

      function ask(msg) {
        return new Promise(function(resolve) { setDlg({msg:msg, resolve:resolve}); });
      }
      function handleConfirm() { if (dlg) { dlg.resolve(true); } setDlg(null); }
      function handleCancel()  { if (dlg) { dlg.resolve(false); } setDlg(null); }
      function goView(v) { setView(v); setNavKey(function(k){return k+1;}); }

      var client = null, vSession = null, clientSessions = [];
      for (var ci=0; ci<data.clients.length; ci++) {
        if (data.clients[ci].id === activeClientId) { client = data.clients[ci]; break; }
      }
      for (var si=0; si<data.sessions.length; si++) {
        if (data.sessions[si].id === viewSessionId) { vSession = data.sessions[si]; break; }
      }
      if (client) {
        clientSessions = data.sessions
          .filter(function(s){ return s.clientId === client.id || (s.clientIds && s.clientIds.indexOf(client.id) !== -1); })
          .sort(function(a,b){ return new Date(b.date)-new Date(a.date); });
      }

      function saveSession(session) {
        var library = data.exerciseLibrary || [];
        var newExs = [];
        session.exercises.forEach(function(ex) {
          var found = false;
          library.forEach(function(l){ if (l.name.toLowerCase()===ex.name.toLowerCase()){found=true;} });
          if (!found) { newExs.push({id:uid(),name:ex.name,pattern:ex.pattern,unilateral:ex.unilateral||false}); }
        });
        var newSessions = data.sessions.filter(function(s){ return s.id !== session.id; });
        newSessions.push(session);
        persist({...data, sessions:newSessions, exerciseLibrary:library.concat(newExs)});
        setActiveSession(null);
        goView("client");
        showToast(newExs.length>0 ? "Saved · "+newExs.length+" exercise(s) added to library ✓" : "Session saved ✓");
      }

      function saveTpl(tpl) {
        var templates = data.templates || [];
        var exists = false;
        templates.forEach(function(t){ if(t.id===tpl.id){exists=true;} });
        var newTemplates = exists
          ? templates.map(function(t){ return t.id===tpl.id?tpl:t; })
          : templates.concat([tpl]);
        persist({...data, templates:newTemplates});
        setEditingTpl(null);
        showToast('"'+tpl.name+'" saved ✓');
        if(tplClientId){goView("client");}
      }

      async function deleteClient(id) {
        var c = data.clients.find(function(x){ return x.id===id; });
        var ok = await ask('Delete client "' + (c?c.name:"") + '"?');
        if (!ok) { return; }
        var updatedSessions = data.sessions
          .filter(function(s){
            // Verwijder alleen solo-sessies van deze klant
            var isDuoSession = s.clientIds && s.clientIds.length > 1;
            if (isDuoSession) { return true; } // behoud duo-sessies
            return s.clientId !== id;
          })
          .map(function(s){
            // Verwijder klant uit clientIds van duo-sessies
            var isDuoSession = s.clientIds && s.clientIds.length > 1;
            if (!isDuoSession) { return s; }
            return {...s, clientIds: s.clientIds.filter(function(cid){ return cid !== id; })};
          });
        persist({...data, clients:data.clients.filter(function(x){return x.id!==id;}), sessions:updatedSessions});
        showToast("Client deleted");
      }
      async function deleteSession(id) {
        var s = data.sessions.find(function(x){ return x.id===id; });
        var ok = await ask("Delete session from "+(s?fmtDate(s.date):"?")+"?");
        if (!ok) { return; }
        persist({...data, sessions:data.sessions.filter(function(x){return x.id!==id;})});
        showToast("Session deleted");
      }
      async function deleteExercise(id) {
        var lib = data.exerciseLibrary || [];
        var ex = lib.find(function(e){ return e.id===id; });
        var ok = await ask('Delete exercise "' + (ex?ex.name:"") + '"?');
        if (!ok) { return; }
        persist({...data, exerciseLibrary:lib.filter(function(e){return e.id!==id;})});
        showToast("Exercise deleted");
      }
      async function deleteTemplate(id) {
        var templates = data.templates || [];
        var tpl = templates.find(function(t){ return t.id===id; });
        var ok = await ask('Delete template "' + (tpl?tpl.name:"") + '"?');
        if (!ok) { return; }
        persist({...data, templates:templates.filter(function(t){return t.id!==id;})});
        showToast("Template deleted");
      }

      var activeSessionDate = activeSession ? toLocalISO(activeSession.date) : null;
      var prevByName = {};
      clientSessions.forEach(function(s){
        if (activeSessionDate && toLocalISO(s.date) === activeSessionDate) { return; }
        s.exercises.forEach(function(ex){
          if (!exForClient(ex, s, activeClientId)) { return; }
          var sets = setsForClient(ex, s, activeClientId);
          var pkey=ex.name.trim().toLowerCase(); if (!prevByName[pkey]) { prevByName[pkey]={sets:sets,date:s.date}; }
        });
      });

      var prevByNameB = {};
      if (activeSession && isDuo(activeSession)) {
        var duoPartnerBId = activeSession.clientIds[1];
        var duoPartnerBSessions = data.sessions.filter(function(s){
          return s.clientId===duoPartnerBId||(s.clientIds&&s.clientIds.indexOf(duoPartnerBId)!==-1);
        }).sort(function(a,b){return new Date(b.date)-new Date(a.date);});
        duoPartnerBSessions.forEach(function(s){
          if (activeSessionDate && toLocalISO(s.date) === activeSessionDate) { return; }
          s.exercises.forEach(function(ex){
            if (!exForClient(ex, s, duoPartnerBId)) { return; }
            var sets = setsForClient(ex, s, duoPartnerBId);
            var pkeyB=ex.name.trim().toLowerCase(); if (!prevByNameB[pkeyB]) { prevByNameB[pkeyB]={sets:sets,date:s.date}; }
          });
        });
      }

      var allEntriesByName = {};
      clientSessions.forEach(function(s){
        s.exercises.forEach(function(ex){
          if (!exForClient(ex, s, activeClientId)) { return; }
          var sets = setsForClient(ex, s, activeClientId);
          var isClientB = isDuo(s) && s.clientIds[0] !== activeClientId;
          var performed = isClientB ? (ex.performedUnilateralB||false) : (ex.performedUnilateral||false);
          var key = performed ? exNameKey(ex.name)+"__uni" : exNameKey(ex.name);
          if (!allEntriesByName[key]) { allEntriesByName[key]={entries:[],canonicalName:normalizeName(ex.name),pattern:ex.pattern}; }
          allEntriesByName[key].entries.push({
            date:s.date, sets:sets,
            maxWeight:Math.max.apply(null,sets.map(function(st){return parseW(st.weight)||0;})),
            totalVol:sets.reduce(function(sum,st){return sum+(parseW(st.weight)||0)*(parseInt(st.reps)||0);},0),
          });
        });
      });

      var library   = data.exerciseLibrary || [];
      var templates = data.templates || [];

      return (
        <Shell saving={saving} onPullSearch={handlePullSearch}>
          {view==="clients" && (
            <div key={navKey} className="page-enter">
              <Header title="Clients"
                rightAction={{label:"Library",fn:function(){goView("library");}}}
              />

              {(function(){
                if (!activeSession) { return null; }
                var hasData = activeSession.exercises.some(function(ex){
                  return (ex.sets||[]).concat(ex.setsB||[]).some(function(s){ return (s.weight&&s.weight.trim())||(s.reps&&s.reps.trim()); });
                });
                if (!hasData) { return null; }
                var sessClient = data.clients.find(function(c){ return c.id === (activeSession.clientIds&&activeSession.clientIds[0]); });
                var sessClientName = sessClient ? sessClient.name.split(" ")[0] : "unknown";
                return (
                  <div onClick={function(){setActiveClientId(activeSession.clientIds&&activeSession.clientIds[0]);goView("session");}} style={{margin:"12px 16px",padding:"14px 16px",background:T.accent,borderRadius:8,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between",boxShadow:"0 2px 10px rgba(220,79,42,0.30)"}}>
                    <div>
                      <div style={{color:"#fff",fontWeight:600,fontSize:14}}>Session {sessClientName} in progress</div>
                      <div style={{color:"rgba(255,255,255,0.75)",fontSize:11,marginTop:2}}>{activeSession.exercises.length} exercise{activeSession.exercises.length!==1?"s":""} · {toLocalISO(activeSession.date)}</div>
                    </div>
                    <div style={{color:"#fff",fontSize:20,fontWeight:300}}>→</div>
                  </div>
                );
              })()}
              <ClientList data={data} onSelect={function(id){setActiveClientId(id);setClientTab("Sessions");goView("client");}} onDelete={deleteClient}
                onRename={function(updatedClients){ persist({...data, clients:updatedClients}); showToast("Name saved ✓"); }}
                showSearch={showSearch} onHideSearch={function(){setShowSearch(false);}}
              />
              <AddClientInline data={data} persist={persist} showToast={showToast}/>
              <LogoutBar/>
            </div>
          )}

          {view==="library" && (
            <div key={navKey} className="page-enter">
              <Header title="Exercises" back={function(){goView("clients");}} rightAction={{label:"Add exercise", fn:function(){setLibTriggerAdd(true);}}}/>
              <ExerciseLibrary data={data} persist={persist} showToast={showToast} onDelete={deleteExercise} showSearch={showSearch} onHideSearch={function(){setShowSearch(false);}} triggerAdd={libTriggerAdd} onTriggerAddDone={function(){setLibTriggerAdd(false);}}/>
            </div>
          )}

          {view==="templates" && !editingTpl && (
            <div key={navKey} className="page-enter">
              <Header title="Templates" back={function(){tplClientId?goView("client"):goView("clients");}} rightAction={{label:"Add template", fn:function(){ setEditingTpl({id:uid(),name:"",exercises:[],client_id:tplClientId}); }}}/>
              <TemplateList data={data} clientId={tplClientId}
                onNew={function(){ setEditingTpl({id:uid(),name:"",exercises:[],client_id:tplClientId}); }}
                onEdit={function(tpl){ setEditingTpl({...tpl,exercises:(tpl.exercises||[]).map(function(e){return {...e,sets:e.sets||[{weight:"",reps:""}]};})}); }}
                onDelete={deleteTemplate}
              />
            </div>
          )}

          {view==="templates" && editingTpl && (
            <div key={navKey} className="page-enter">
              <Header title={editingTpl.name||"New template"} back={function(){setEditingTpl(null);if(tplClientId){goView("client");}}}
                rightAction={{label:"Save", fn:function(){ if(editingTpl.name.trim()){ saveTpl(editingTpl); } }}}
              />
              <TemplateEditor template={editingTpl} onChange={setEditingTpl} library={library}/>
            </div>
          )}

          {view==="client" && client && (
            <div key={navKey} className="page-enter">
              <ClientDetail client={client} sessions={clientSessions} data={data}
                onBack={function(){goView("clients");}}
                onStartSession={function(s){setActiveSession(s);goView("session");}}
                onViewSession={function(id){setViewSessionId(id);goView("viewSession");}}
                onExport={function(){goView("export");}}
                onNewTemplate={function(){setTplClientId(activeClientId);setEditingTpl({id:uid(),name:"",exercises:[],client_id:activeClientId});goView("templates");}}
                onLoadTemplate={function(){goView("loadTemplate");}}
                onDeleteSession={deleteSession}
                onExHistory={function(name){setExHistoryName(name);setClientTab("Progress");setPrevView("client");goView("exHistory");}}
                initialTab={clientTab}
                showSearch={showSearch} onHideSearch={function(){setShowSearch(false);}}
              />
            </div>
          )}

          {view==="loadTemplate" && (
            <div key={navKey} className="page-enter">
              <Header title="Choose a template" back={function(){goView("client");}}/>
              <div className="ai" style={{paddingBottom:32}}>
                {(function(){
                  var clientTemplates=(data.templates||[]).filter(function(t){return t.client_id===activeClientId;});
                  if(clientTemplates.length===0) return <div style={{color:T.textMuted,fontSize:13,padding:"40px 20px",textAlign:"center"}}>No templates for this client yet.</div>;
                  return clientTemplates.map(function(tpl){
                    return <div key={tpl.id} className="rh" onClick={function(){
                      var exercises=tpl.exercises.map(function(e){return {id:uid(),name:e.name,pattern:e.pattern,unilateral:e.unilateral||false,isUnilateralExercise:e.unilateral||false,performedUnilateral:false,sets:(e.sets||[{weight:"",reps:""}]).map(function(s){return {weight:s.weight||"",reps:s.reps||""};}) ,notes:""};});
                      setActiveSession({id:uid(),clientId:activeClientId,clientIds:[activeClientId],date:new Date().toISOString(),exercises:exercises,notes:""});
                      goView("session");
                    }} style={{padding:"16px 20px",borderBottom:"1px solid "+T.border,background:T.surface,cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div>
                        <div style={{fontWeight:600,fontSize:15}}>{tpl.name}</div>
                        <div style={{fontSize:11,color:T.textMuted,marginTop:4}}>{(tpl.exercises||[]).map(function(e){return e.name;}).join(", ")}</div>
                      </div>
                      <span style={{color:T.accent,fontSize:13,fontWeight:500}}>→</span>
                    </div>;
                  });
                })()}
              </div>
            </div>
          )}

          {(view==="session"||view==="editSession") && activeSession && (
            <div key={navKey} className="page-enter">
              <Header title={view==="session"?"Session in progress":"Edit session"} back={function(){goView("client");}}
                rightAction={{label:"Finish", fn:function(){saveSession(activeSession);}}}
              />
              {(function(){
                var duoClients = null;
                if (isDuo(activeSession)) {
                  var cA = data.clients.find(function(c){ return c.id === activeSession.clientIds[0]; });
                  var cB = data.clients.find(function(c){ return c.id === activeSession.clientIds[1]; });
                  if (cA && cB) { duoClients = [cA, cB]; }
                }
                return (
                  <SessionEditor session={activeSession} onChange={setActiveSession}
                    library={library} templates={templates} showToast={showToast} prevByName={prevByName}
                    prevByNameB={prevByNameB}
                    duoClients={duoClients}
                    allClients={data.clients}
                    allEntriesByName={allEntriesByName}
                    onDuoPick={function(secondId){
                      var ids=[activeSession.clientIds[0],secondId];
                      setActiveSession({...activeSession,clientIds:ids});
                    }}
                    onViewExHistory={function(name){setExHistoryName(name);setPrevView(view);goView("exHistory");}}
                  />
                );
              })()}
            </div>
          )}

          {view==="viewSession" && vSession && (
            <div key={navKey} className="page-enter">
              <Header title={"Session "+fmtDate(vSession.date)} back={function(){goView("client");}}
                rightAction={{label:"Edit", fn:function(){setActiveSession({...vSession});goView("editSession");}}}
              />
              <SessionView session={vSession} client={client} allEntriesByName={allEntriesByName} data={data}/>
            </div>
          )}

          {view==="exHistory" && exHistoryName && (
            <div key={navKey} className="page-enter">
              <Header title={(allEntriesByName[exHistoryName]&&allEntriesByName[exHistoryName].canonicalName?allEntriesByName[exHistoryName].canonicalName:exHistoryName).replace("__uni"," (uni)")} back={function(){goView(prevView);}}/>
              <ExerciseHistoryPage entries={((allEntriesByName[exHistoryName]||{}).entries||[]).sort(function(a,b){return new Date(b.date)-new Date(a.date);})}/>
            </div>
          )}

          {view==="export" && client && (
            <div key={navKey} className="page-enter">
              <Header title="Export" back={function(){goView("client");}}/>
              <ExportView client={client} sessions={clientSessions}/>
            </div>
          )}

          {dlg && <ConfirmDialog msg={dlg.msg} onConfirm={handleConfirm} onCancel={handleCancel}/>}
          {toast && <Toast msg={toast}/>}
        </Shell>
      );
    }

    // ── Shell ──────────────────────────────────────────────────────────────────
    function Shell(props) {
      var touchStartY=useRef(null); var touchStartScroll=useRef(0);
      function handleTouchStart(e){
        touchStartY.current=e.touches[0].clientY;
        touchStartScroll.current=window.scrollY||document.documentElement.scrollTop||0;
      }
      function handleTouchMove(e){
        if(touchStartY.current===null){return;}
        var dy=e.touches[0].clientY-touchStartY.current;
        if(dy>55&&touchStartScroll.current<10){
          touchStartY.current=null;
          if(props.onPullSearch){props.onPullSearch();}
        }
      }
      return (
        <div onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} style={{minHeight:"100vh",background:T.bg,color:T.text,fontFamily:"'Inter',sans-serif",maxWidth:480,margin:"0 auto",position:"relative"}}>
          <style dangerouslySetInnerHTML={{__html:`
            @import url('https://fonts.googleapis.com/css2?family=Raleway:wght@700;800&family=Inter:wght@300;400;500&display=swap');
            *{box-sizing:border-box;margin:0;padding:0}
            input,textarea,select,button{font-family:inherit}
            button{cursor:pointer}
            ::-webkit-scrollbar{width:4px}
            ::-webkit-scrollbar-track{background:#f5f3ef}
            ::-webkit-scrollbar-thumb{background:#d0cbc2;border-radius:2px}
            .rh:hover{background:#faf9f7!important}
            @keyframes slideUp{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
            @keyframes slideIn{from{opacity:0}to{opacity:1}}
            @keyframes searchReveal{from{max-height:0;opacity:0}to{max-height:56px;opacity:1}}
            .ai{animation:slideUp 0.18s ease}
            .page-enter{animation:slideIn 0.2s ease}
            .search-reveal{animation:searchReveal 0.2s ease forwards;overflow:hidden}
            input:focus,textarea:focus{outline:none;border-color:#dc4f2a!important}
            input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:#dc4f2a}
          `}}/>
          {props.saving && (
            <div style={{position:"fixed",top:0,left:0,right:0,height:2,background:T.accent,zIndex:999,animation:"slideUp 0s"}}/>
          )}
          {props.children}
        </div>
      );
    }

    function Header(props) {
      return (
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 20px",borderBottom:"1px solid "+T.border,background:T.surface,position:"sticky",top:0,zIndex:10}}>
          <div style={{display:"flex",alignItems:"center",gap:10,minWidth:0}}>
            {props.back && <button onClick={props.back} style={{background:"none",border:"none",color:T.textMuted,fontSize:18,lineHeight:1,padding:"0 4px 0 0",flexShrink:0}}>←</button>}
            <span style={{fontFamily:"'Raleway',sans-serif",fontWeight:800,fontSize:22,letterSpacing:0.5,textTransform:"uppercase",color:T.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{props.title}</span>
          </div>
          <div style={{display:"flex",gap:6,flexShrink:0,marginLeft:8,alignItems:"center"}}>
            {props.onSearch && <button onClick={props.onSearch} style={{background:"none",border:"none",color:T.textMid,height:32,width:32,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",borderRadius:4}}><svg width="17" height="17" viewBox="0 0 17 17" fill="none"><circle cx="7.5" cy="7.5" r="5.5" stroke={T.textMid} strokeWidth="1.6"/><line x1="11.5" y1="11.5" x2="15.5" y2="15.5" stroke={T.textMid} strokeWidth="1.6" strokeLinecap="round"/></svg></button>}
            {props.rightAction2 && <button onClick={props.rightAction2.fn} style={{background:"none",border:"1px solid "+T.border,color:T.textMid,height:32,padding:"0 12px",fontSize:11,letterSpacing:0.5,textTransform:"uppercase",borderRadius:4,cursor:"pointer"}}>{props.rightAction2.label}</button>}
            {props.rightAction  && <button onClick={props.rightAction.fn}  style={{background:T.accent,border:"none",color:"#fff",height:32,padding:"0 14px",fontSize:11,fontWeight:500,letterSpacing:0.5,textTransform:"uppercase",borderRadius:4,cursor:"pointer"}}>{props.rightAction.label}</button>}
          </div>
        </div>
      );
    }

    function Loader() { return <div style={{minHeight:"100vh",background:T.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8}}><div style={{fontFamily:"'Raleway',sans-serif",fontWeight:800,fontSize:48,letterSpacing:1,color:T.text,textTransform:"uppercase"}}>Trainer App</div><div style={{fontFamily:"'Inter',sans-serif",fontWeight:300,fontSize:11,color:T.textMuted,letterSpacing:2,textTransform:"uppercase"}}>by MVDRPT</div></div>; }

    function Stepper(props) {
      var val = props.value;
      var step = props.step || 1;
      var num = parseFloat(val) || 0;
      function dec() { var n = Math.max(0, +(num - step).toFixed(2)); props.onChange(n === 0 ? "" : String(n)); }
      function inc() { props.onChange(String(+(num + step).toFixed(2))); }
      return (
        <div style={{display:"flex",alignItems:"center",border:"1px solid "+T.border,borderRadius:4,background:T.bg,overflow:"hidden"}}>
          <button onMouseDown={function(e){e.preventDefault();dec();}} style={{background:"none",border:"none",borderRight:"1px solid "+T.border,color:T.textMid,fontSize:18,lineHeight:1,padding:"0 10px",height:38,cursor:"pointer",flexShrink:0}}>−</button>
          <input type="number" inputMode={step<1?"decimal":"numeric"} value={val} onChange={function(e){props.onChange(e.target.value);}} onFocus={function(e){e.target.select();}} placeholder={props.placeholder} style={{flex:1,background:"none",border:"none",color:T.text,fontSize:13,textAlign:"center",padding:"8px 2px",minWidth:0,outline:"none"}}/>
          <button onMouseDown={function(e){e.preventDefault();inc();}} style={{background:"none",border:"none",borderLeft:"1px solid "+T.border,color:T.textMid,fontSize:18,lineHeight:1,padding:"0 10px",height:38,cursor:"pointer",flexShrink:0}}>+</button>
        </div>
      );
    }
    function Toast(props) { return <div style={{position:"fixed",bottom:28,left:"50%",transform:"translateX(-50%)",background:T.text,color:T.bg,padding:"10px 20px",fontSize:12,zIndex:100,animation:"slideUp 0.2s ease",letterSpacing:0.3,whiteSpace:"nowrap",maxWidth:"90vw",textAlign:"center"}}>{props.msg}</div>; }
    function Label(props) { return <div style={{fontSize:10,color:T.textMuted,textTransform:"uppercase",letterSpacing:0.6}}>{props.children}</div>; }
    function UniTag() { return <span style={{fontSize:9,marginLeft:7,padding:"1px 5px",background:T.accentBg,color:T.accent,borderRadius:4,textTransform:"uppercase",letterSpacing:0.3}}>uni</span>; }

    function SwipeRow(props) {
      var [offset,setOffset]=useState(0);
      var dragging=useRef(false); var startX=useRef(0); var startY=useRef(0);
      var lastX=useRef(0); var lastT=useRef(0); var vel=useRef(0); var axisLocked=useRef(null);
      var REVEAL=props.onEdit?144:72;

      // close when another row opens
      useEffect(function(){
        if(props.openId!==null&&props.openId!==undefined&&props.rowId!==undefined&&props.openId!==props.rowId){
          setOffset(0);
        }
      },[props.openId]);

      function onTouchStart(e){
        dragging.current=true; axisLocked.current=null;
        startX.current=e.touches[0].clientX; startY.current=e.touches[0].clientY;
        lastX.current=startX.current; lastT.current=Date.now(); vel.current=0;
      }
      function onTouchMove(e){
        if(!dragging.current){return;}
        var dx=e.touches[0].clientX-startX.current;
        var dy=e.touches[0].clientY-startY.current;
        if(axisLocked.current===null){
          if(Math.abs(dx)<4&&Math.abs(dy)<4){return;}
          axisLocked.current=Math.abs(dx)>Math.abs(dy)?"x":"y";
        }
        if(axisLocked.current==="y"){dragging.current=false;return;}
        e.preventDefault();
        var now=Date.now(); var dt=now-lastT.current||1;
        vel.current=(e.touches[0].clientX-lastX.current)/dt;
        lastX.current=e.touches[0].clientX; lastT.current=now;
        var raw=offset+dx; // delta from current position? No — from start
        // simple: track from startX relative to current open offset

        if(snap===0&&props.onOpen&&props.openId===props.rowId){props.onOpen(null);}

    function ReorderPage(props) {
      var [items,setItems]=useState(props.exercises.slice());
      var dragIdx=useRef(null);
      var dragOverIdx=useRef(null);
      function onDragStart(i){dragIdx.current=i;}
      function onDragEnter(i){dragOverIdx.current=i;}
      function onDragEnd(){
        var from=dragIdx.current; var to=dragOverIdx.current;
        if(from===null||to===null||from===to){dragIdx.current=null;dragOverIdx.current=null;return;}
        var arr=items.slice();
        arr.splice(to,0,arr.splice(from,1)[0]);
        setItems(arr);
        dragIdx.current=null; dragOverIdx.current=null;
      }
      // Touch drag support
      var touchStartY=useRef(0); var touchDragIdx=useRef(null);
      function onTouchStart(i,e){touchDragIdx.current=i;touchStartY.current=e.touches[0].clientY;}
      function onTouchMove(e){
        e.preventDefault();
        var y=e.touches[0].clientY;
        var els=document.querySelectorAll(".reorder-item");
        var target=null;
        els.forEach(function(el,idx){var r=el.getBoundingClientRect();if(y>=r.top&&y<=r.bottom){target=idx;}});
        if(target!==null){dragOverIdx.current=target;}
      }
      function onTouchEnd(){
        var from=touchDragIdx.current; var to=dragOverIdx.current;
        if(from!==null&&to!==null&&from!==to){
          var arr=items.slice();
          arr.splice(to,0,arr.splice(from,1)[0]);
          setItems(arr);
        }
        touchDragIdx.current=null; dragOverIdx.current=null;
      }
      return (
        <div className="ai">
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 20px",borderBottom:"1px solid "+T.border,background:T.surface,position:"sticky",top:48,zIndex:10}}>
            <span style={{fontSize:14,fontWeight:500}}>Reorder</span>
            <div style={{display:"flex",gap:8}}>
              <button onClick={props.onCancel} style={{background:"none",border:"1px solid "+T.border,color:T.textMid,padding:"6px 14px",fontSize:12,borderRadius:4,cursor:"pointer"}}>Cancel</button>
              <button onClick={function(){props.onSave(items);}} style={{background:T.accent,border:"none",color:"#fff",padding:"6px 14px",fontSize:12,borderRadius:4,cursor:"pointer",fontWeight:500}}>Save</button>
            </div>
          </div>
          <div style={{padding:"12px 0"}}>
            {items.map(function(ex,i){
              var color=PC[ex.pattern]||T.textMuted;
              return (
                <div key={ex.id} className="reorder-item"
                  draggable
                  onDragStart={function(){onDragStart(i);}}
                  onDragEnter={function(){onDragEnter(i);}}
                  onDragEnd={onDragEnd}
                  onDragOver={function(e){e.preventDefault();}}
                  onTouchStart={function(e){onTouchStart(i,e);}}
                  onTouchMove={onTouchMove}
                  onTouchEnd={onTouchEnd}
                  style={{margin:"0 16px 8px",padding:"12px 16px",background:T.surface,border:"1px solid "+T.border,borderLeft:"3px solid "+color,borderRadius:4,display:"flex",alignItems:"center",gap:12,cursor:"grab",userSelect:"none",touchAction:"none"}}>
                  <span style={{color:T.textMuted,fontSize:18,lineHeight:1}}>☰</span>
                  <div>
                    <div style={{fontSize:13,fontWeight:500}}>{ex.name}</div>
                    <div style={{fontSize:10,color:color,textTransform:"uppercase",letterSpacing:0.4,marginTop:2}}>{ex.pattern}{ex.supersetId?" · superset":""}</div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

        else{props.onChange({...ex,sets:ex.sets.concat([newSet])});}

        if(isB){var nb=getSetsB().map(function(s,idx){return idx===i?{...s,[field]:val}:s;});props.onChange({...ex,setsB:nb});}
        else if(isAB){var ns=ex.sets.map(function(s,idx){return idx===i?{...s,[field]:val}:s;});props.onChange({...ex,sets:ns,setsB:ns.map(function(s){return {...s};})});}
        else{props.onChange({...ex,sets:ex.sets.map(function(s,idx){return idx===i?{...s,[field]:val}:s;})});}
      }

        if(isB){props.onChange({...ex,setsB:getSetsB().filter(function(_,idx){return idx!==i;})});}

                      return <button key={l} onClick={function(e){e.stopPropagation();setLabel(l);}} style={{padding:"2px 7px",fontSize:9,background:active?T.accent:"none",border:"none",color:active?"#fff":T.textMuted,textTransform:"uppercase",letterSpacing:0.3,cursor:"pointer",fontFamily:"inherit"}}>{name}</button>;

    function ExerciseHistoryPage(props) {
      var entries=props.entries||[];
      if(entries.length===0){return <div style={{padding:"40px 20px",color:T.textMuted,fontSize:13,textAlign:"center"}}>No data yet for this exercise.</div>;}
      var sorted=entries.slice().sort(function(a,b){return new Date(a.date)-new Date(b.date);});
      var isBodyweight=sorted.every(function(e){return !e.maxWeight||e.maxWeight===0;});
      // For bodyweight: use max reps across all sets per entry
      function entryMaxReps(e){return Math.max.apply(null,e.sets.map(function(s){return parseInt(s.reps)||0;}).concat([0]));}
      var maxWeight=isBodyweight?0:Math.max.apply(null,sorted.map(function(e){return e.maxWeight;}));
      if(!isBodyweight&&!maxWeight){maxWeight=1;}
      function setsAtMaxW(e){return (e.sets||[]).filter(function(st){return (parseW(st.weight)||0)===e.maxWeight;}).length;}
      function maxRepsAtW(e){return Math.max.apply(null,(e.sets||[]).filter(function(st){return (parseW(st.weight)||0)===e.maxWeight;}).map(function(st){return parseInt(st.reps)||0;}).concat([0]));}
      function setsAtMaxWR(e){var mr=maxRepsAtW(e);return (e.sets||[]).filter(function(st){return (parseW(st.weight)||0)===e.maxWeight&&(parseInt(st.reps)||0)===mr;}).length;}
      var bestEntry=sorted.reduce(function(prev,cur){
        if(!prev){return cur;}
        if(isBodyweight){
          var pr=entryMaxReps(prev); var cr=entryMaxReps(cur);
          if(cr>pr){return cur;}
          if(cr===pr&&cur.sets.length>prev.sets.length){return cur;}
          return prev;
        }
        if(cur.maxWeight>prev.maxWeight){return cur;}
        if(cur.maxWeight===prev.maxWeight){
          var cr2=maxRepsAtW(cur),pr2=maxRepsAtW(prev);
          if(cr2>pr2){return cur;}
          if(cr2===pr2&&setsAtMaxWR(cur)>setsAtMaxWR(prev)){return cur;}
        }
        return prev;
      },null);
      var bestDate=bestEntry?bestEntry.date:null;
      return (
        <div className="ai" style={{paddingBottom:40}}>
          <div style={{padding:"16px 20px 12px",background:T.surfaceAlt,borderBottom:"1px solid "+T.border}}>
            <div style={{fontSize:10,color:T.textMuted,marginBottom:8,textTransform:"uppercase",letterSpacing:0.5}}>{isBodyweight?"Max reps per session":"Max weight per session (kg)"}</div>
            {(function(){
              var PAD={t:16,r:16,b:32,l:36};
              var W=Math.min(440,window.innerWidth-40);
              var H=110;
              var iW=W-PAD.l-PAD.r; var iH=H-PAD.t-PAD.b;
              var vals=sorted.map(function(e){return isBodyweight?entryMaxReps(e):e.maxWeight||0;});
              var minV=Math.min.apply(null,vals);
              var maxV=Math.max.apply(null,vals)||1;
              var yMin=Math.max(0,minV-Math.ceil((maxV-minV)*0.1||1));
              var yMax=maxV+Math.ceil((maxV-yMin)*0.1||1);
              var pts=sorted.map(function(e,i){
                var v=isBodyweight?entryMaxReps(e):e.maxWeight||0;
                var x=PAD.l+(sorted.length<2?iW/2:i/(sorted.length-1)*iW);
                var y=PAD.t+iH-(v>0?(v-yMin)/(yMax-yMin)*iH:0);
                return {x:x,y:y,v:v,e:e};
              });
              var polyline=pts.map(function(p){return p.x+","+p.y;}).join(" ");
              var area=pts.map(function(p,i){return (i===0?"M":"")+p.x+","+p.y;}).join(" ")+" L"+pts[pts.length-1].x+","+(PAD.t+iH)+" L"+pts[0].x+","+(PAD.t+iH)+" Z";
              var yTicks=[yMin,yMin+(yMax-yMin)/2,yMax].map(Math.round).filter(function(v,i,a){return a.indexOf(v)===i;});
              return (
                <svg width={W} height={H} style={{display:"block",overflow:"visible"}}>
                  {yTicks.map(function(v,i){
                    var y=PAD.t+iH-(v-yMin)/(yMax-yMin)*iH;
                    return <g key={i}><line x1={PAD.l} y1={y} x2={PAD.l+iW} y2={y} stroke={T.border} strokeWidth="1"/><text x={PAD.l-4} y={y+4} textAnchor="end" fontSize="9" fill={T.textMuted}>{Math.round(v)}</text></g>;
                  })}
                  <path d={area} fill={T.accent} fillOpacity="0.12"/>
                  <polyline points={polyline} fill="none" stroke={T.accent} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round"/>
                  {pts.map(function(p,i){
                    var isBestPt=bestDate&&p.e.date===bestDate;
                    var lbl=isBodyweight?(p.v>0?p.v+" reps":""):(p.v>0?fmtW(p.v):"");
                    return (
                      <g key={i}>
                        <circle cx={p.x} cy={p.y} r={isBestPt?5:3} fill={isBestPt?"#f59e0b":T.accent} stroke={T.surface} strokeWidth="1.5"/>
                        {(sorted.length<=8||isBestPt)&&lbl&&<text x={p.x} y={p.y-8} textAnchor="middle" fontSize="9" fill={isBestPt?"#d97706":T.textMid} fontWeight={isBestPt?"600":"400"}>{lbl}</text>}
                        <text x={p.x} y={H-2} textAnchor="middle" fontSize="8" fill={T.textMuted}>{new Date(p.e.date).toLocaleDateString("en-GB",{day:"2-digit",month:"short"})}</text>
                      </g>
                    );
                  })}
                </svg>
              );
            })()}
          </div>
          {entries.map(function(e,i){
            var isBest=bestDate&&e.date===bestDate;
            var dispVal=isBodyweight?(entryMaxReps(e)>0?entryMaxReps(e)+" reps":"—"):(e.maxWeight>0?fmtW(e.maxWeight)+" kg":"—");
            return(
            <div key={i} style={{padding:"14px 20px",borderBottom:"1px solid "+T.border,background:isBest?"#fffbeb":T.surface}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                <div style={{fontSize:13,fontWeight:500}}>{fmtDate(e.date)}</div>
                <div style={{textAlign:"right"}}><div style={{fontSize:14,fontWeight:500,display:"flex",alignItems:"center",justifyContent:"flex-end",gap:4}}>{isBest&&<span style={{fontSize:14}}>⭐</span>}{dispVal}</div>{!isBodyweight&&e.totalVol>0&&<div style={{fontSize:10,color:T.textMuted}}>{e.totalVol.toLocaleString("en-GB")} vol.</div>}</div>
              </div>
              <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                {e.sets.map(function(s,si){return <span key={si} style={{fontSize:11,padding:"3px 7px",background:T.surfaceAlt,border:"1px solid "+T.border,borderRadius:4,color:T.textMid}}>{si+1}. {s.weight?s.weight+"kg":"—"} × {s.reps||"—"}</span>;})}
              </div>
            </div>
          );})}
        </div>
      );
    }
